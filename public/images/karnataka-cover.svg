<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="ksky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4882a"/>
      <stop offset="35%" stop-color="#e0a848"/>
      <stop offset="65%" stop-color="#e8c06a"/>
      <stop offset="100%" stop-color="#d8b870"/>
    </linearGradient>
    <radialGradient id="ksun" cx="0.3" cy="0.25" r="0.3">
      <stop offset="0%" stop-color="#fff5d8" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#f0d888" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e8c06a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8a050"/>
      <stop offset="100%" stop-color="#a08038"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="450" fill="url(#ksky)"/>
  <!-- Sun glow -->
  <rect width="800" height="450" fill="url(#ksun)"/>
  <!-- Haze near horizon -->
  <rect x="0" y="200" width="800" height="100" fill="#d8c080" opacity="0.2"/>
  <!-- Far boulder formation (layer 1 - most distant) -->
  <g fill="#b89850" opacity="0.35">
    <ellipse cx="620" cy="215" rx="45" ry="35"/>
    <ellipse cx="660" cy="225" rx="30" ry="25"/>
    <ellipse cx="590" cy="230" rx="25" ry="20"/>
    <ellipse cx="640" cy="210" rx="20" ry="30"/>
  </g>
  <!-- Far boulder formation left -->
  <g fill="#b89850" opacity="0.3">
    <ellipse cx="150" cy="220" rx="35" ry="28"/>
    <ellipse cx="180" cy="230" rx="25" ry="22"/>
    <ellipse cx="130" cy="235" rx="20" ry="18"/>
  </g>
  <!-- Temple/gopuram silhouette (Virupaksha style) -->
  <g transform="translate(400, 200)" fill="#8a6830" opacity="0.5">
    <!-- Base -->
    <rect x="-25" y="0" width="50" height="35" rx="1"/>
    <!-- Tiered tower -->
    <rect x="-20" y="-20" width="40" height="20" rx="1"/>
    <rect x="-16" y="-38" width="32" height="18" rx="1"/>
    <rect x="-12" y="-52" width="24" height="14" rx="1"/>
    <rect x="-8" y="-62" width="16" height="10" rx="1"/>
    <rect x="-4" y="-70" width="8" height="8" rx="1"/>
    <!-- Finial -->
    <ellipse cx="0" cy="-72" rx="3" ry="4"/>
    <line x1="0" y1="-76" x2="0" y2="-82" stroke="#8a6830" stroke-width="1.5"/>
    <!-- Entrance arch -->
    <ellipse cx="0" cy="35" rx="8" ry="12" fill="#6a5020"/>
    <!-- Texture lines -->
    <line x1="-20" y1="-10" x2="20" y2="-10" stroke="#9a7838" stroke-width="0.5" opacity="0.5"/>
    <line x1="-16" y1="-28" x2="16" y2="-28" stroke="#9a7838" stroke-width="0.5" opacity="0.5"/>
    <line x1="-12" y1="-44" x2="12" y2="-44" stroke="#9a7838" stroke-width="0.5" opacity="0.5"/>
  </g>
  <!-- Ruins/pillar silhouettes (left) -->
  <g fill="#9a7838" opacity="0.4">
    <rect x="240" y="205" width="8" height="40" rx="1"/>
    <rect x="236" y="200" width="16" height="6" rx="1"/>
    <rect x="260" y="215" width="7" height="30" rx="1"/>
    <rect x="257" y="210" width="13" height="5" rx="1"/>
    <rect x="280" y="220" width="8" height="25" rx="1"/>
    <!-- Broken pillar -->
    <rect x="300" y="225" width="7" height="20" rx="1"/>
    <path d="M300 225 L303 218 L307 225Z" fill="#9a7838"/>
  </g>
  <!-- Ruins/pillar silhouettes (right) -->
  <g fill="#9a7838" opacity="0.35">
    <rect x="500" y="210" width="8" height="35" rx="1"/>
    <rect x="496" y="205" width="16" height="5" rx="1"/>
    <rect x="525" y="218" width="7" height="27" rx="1"/>
    <rect x="522" y="213" width="13" height="5" rx="1"/>
  </g>
