  <g fill="#b09048" opacity="0.5">
    <ellipse cx="700" cy="280" rx="55" ry="45"/>
    <ellipse cx="745" cy="295" rx="35" ry="30"/>
    <ellipse cx="670" cy="300" rx="30" ry="25"/>
    <ellipse cx="720" cy="265" rx="25" ry="35"/>
    <ellipse cx="760" cy="275" rx="20" ry="28"/>
  </g>
  <!-- Boulder cluster left -->
  <g fill="#b09048" opacity="0.45">
    <ellipse cx="60" cy="290" rx="45" ry="38"/>
    <ellipse cx="100" cy="300" rx="30" ry="28"/>
    <ellipse cx="40" cy="305" rx="25" ry="22"/>
  </g>
  <!-- Ground plane -->
  <path d="M0 310 Q200 300 400 305 Q600 298 800 304 L800 450 L0 450Z" fill="url(#kground)" opacity="0.7"/>
