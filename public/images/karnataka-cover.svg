  <g stroke="#a88a40" stroke-width="1" opacity="0.3" fill="none">
    <path d="M50 340 Q52 330 54 340"/>
    <path d="M55 340 Q57 332 59 340"/>
    <path d="M150 335 Q152 325 154 335"/>
    <path d="M155 335 Q157 327 159 335"/>
    <path d="M250 338 Q252 328 254 338"/>
    <path d="M350 332 Q352 322 354 332"/>
    <path d="M450 336 Q452 326 454 336"/>
    <path d="M550 333 Q552 323 554 333"/>
    <path d="M600 336 Q602 326 604 336"/>
    <path d="M170 342 Q172 334 174 342"/>
    <path d="M320 340 Q322 332 324 340"/>
    <path d="M480 338 Q482 330 484 338"/>
  </g>
  <!-- Coconut palms scattered -->
  <g opacity="0.45">
    <!-- Palm 1 -->
    <path d="M200 308 Q195 280 192 255" stroke="#5a4020" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M192 255 Q172 245 162 258" stroke="#4a6a2a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M192 255 Q208 240 220 250" stroke="#4a6a2a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M192 258 Q178 250 168 264" stroke="#4a6a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M192 258 Q205 248 216 260" stroke="#4a6a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <g opacity="0.35">
    <!-- Palm 2 -->
    <path d="M560 304 Q558 278 562 252" stroke="#5a4020" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M562 252 Q545 242 535 254" stroke="#4a6a2a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M562 252 Q578 238 590 248" stroke="#4a6a2a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M562 256 Q550 248 540 262" stroke="#4a6a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M562 256 Q575 248 586 258" stroke="#4a6a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <g opacity="0.25">
    <!-- Palm 3 (distant) -->
    <path d="M350 302 Q348 282 350 262" stroke="#5a4020" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M350 262 Q336 254 328 264" stroke="#4a6a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M350 262 Q362 252 372 260" stroke="#4a6a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M350 265 Q340 258 332 270" stroke="#4a6a2a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M350 265 Q360 258 368 266" stroke="#4a6a2a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Foreground dry grass -->
  <path d="M0 390 Q200 382 400 386 Q600 380 800 384 L800 450 L0 450Z" fill="#9a7a30" opacity="0.35"/>
  <!-- Near ground -->
  <path d="M0 420 Q200 414 400 418 Q600 410 800 415 L800 450 L0 450Z" fill="#8a6a28" opacity="0.3"/>
  <!-- Birds -->
  <g stroke="#8a6830" stroke-width="1.2" fill="none" opacity="0.25">
    <path d="M180 110 Q185 103 190 110 Q195 103 200 110"/>
    <path d="M220 95 Q224 89 228 95 Q232 89 236 95"/>
    <path d="M160 125 Q164 119 168 125 Q172 119 176 125"/>
  </g>
</svg>