<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="osky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d87830"/>
      <stop offset="25%" stop-color="#e8a048"/>
      <stop offset="50%" stop-color="#f0c868"/>
      <stop offset="75%" stop-color="#e8d080"/>
      <stop offset="100%" stop-color="#d0b870"/>
    </linearGradient>
    <radialGradient id="osun" cx="0.55" cy="0.18" r="0.18">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#ffe898" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#f0c860" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f0c860" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="oocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8a058"/>
      <stop offset="30%" stop-color="#6a8a98"/>
      <stop offset="60%" stop-color="#5a7a90"/>
      <stop offset="100%" stop-color="#4a6a80"/>
    </linearGradient>
    <linearGradient id="osand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0c890"/>
      <stop offset="100%" stop-color="#c8b078"/>
    </linearGradient>
    <linearGradient id="owheel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a6030"/>
      <stop offset="100%" stop-color="#6a4820"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="450" fill="url(#osky)"/>
  <rect width="800" height="450" fill="url(#osun)"/>

  <!-- Sun disk -->
  <circle cx="440" cy="82" r="35" fill="#fff0c0" opacity="0.6"/>
  <circle cx="440" cy="82" r="25" fill="#fff8d8" opacity="0.7"/>

  <!-- Sun rays -->
  <g stroke="#f0d870" stroke-width="1" opacity="0.15">
    <line x1="440" y1="82" x2="300" y2="300"/>
    <line x1="440" y1="82" x2="380" y2="350"/>
    <line x1="440" y1="82" x2="500" y2="350"/>
    <line x1="440" y1="82" x2="600" y2="300"/>
    <line x1="440" y1="82" x2="200" y2="250"/>
    <line x1="440" y1="82" x2="680" y2="250"/>
  </g>

  <!-- Ocean -->
  <path d="M0 180 Q200 175 400 178 Q600 172 800 176 L800 320 L0 320Z" fill="url(#oocean)" opacity="0.7"/>

  <!-- Golden reflection on water -->
  <g opacity="0.15">
    <rect x="380" y="120" width="120" height="200" fill="#f0d870" rx="4"/>
    <rect x="400" y="130" width="80" height="180" fill="#f8e088" rx="3"/>
  </g>

  <!-- Ocean waves -->
  <g fill="none" opacity="0.25">
    <path d="M0 200 Q50 195 100 200 Q150 195 200 200 Q250 195 300 200 Q350 195 400 200 Q450 195 500 200 Q550 195 600 200 Q650 195 700 200 Q750 195 800 200" stroke="#e8d8a0" stroke-width="1"/>
    <path d="M0 220 Q50 215 100 220 Q150 215 200 220 Q250 215 300 220 Q350 215 400 220 Q450 215 500 220 Q550 215 600 220 Q650 215 700 220 Q750 215 800 220" stroke="#c8b880" stroke-width="1"/>
    <path d="M0 240 Q50 236 100 240 Q150 236 200 240 Q250 236 300 240 Q350 236 400 240 Q450 236 500 240 Q550 236 600 240 Q650 236 700 240 Q750 236 800 240" stroke="#a8a070" stroke-width="1"/>
    <path d="M0 260 Q50 257 100 260 Q150 257 200 260 Q250 257 300 260 Q350 257 400 260 Q450 257 500 260 Q550 257 600 260 Q650 257 700 260 Q750 257 800 260" stroke="#8a8a68" stroke-width="0.8"/>
    <path d="M0 280 Q50 278 100 280 Q150 278 200 280 Q250 278 300 280 Q350 278 400 280 Q450 278 500 280 Q550 278 600 280 Q650 278 700 280 Q750 278 800 280" stroke="#7a7a60" stroke-width="0.8"/>
  </g>

  <!-- Shore waves (white foam) -->
  <g fill="white" opacity="0.2">
    <path d="M0 305 Q40 300 80 305 Q120 300 160 305 Q200 300 240 305 Q280 300 320 305 Q360 300 400 305 Q440 300 480 305 Q520 300 560 305 Q600 300 640 305 Q680 300 720 305 Q760 300 800 305 L800 315 Q760 310 720 315 Q680 310 640 315 Q600 310 560 315 Q520 310 480 315 Q440 310 400 315 Q360 310 320 315 Q280 310 240 315 Q200 310 160 315 Q120 310 80 315 Q40 310 0 315Z"/>
  </g>

  <!-- Sandy beach -->
  <path d="M0 310 Q200 305 400 308 Q600 302 800 306 L800 380 L0 380Z" fill="url(#osand)"/>

  <!-- Konark Sun Temple Wheel silhouette (iconic) -->
  <g transform="translate(220, 260) scale(0.85)" fill="url(#owheel)" opacity="0.7">
    <!-- Outer rim -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#7a5428" stroke-width="5"/>
    <!-- Inner rim -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#7a5428" stroke-width="2"/>
    <!-- Hub -->
    <circle cx="0" cy="0" r="12" fill="#7a5428"/>
    <circle cx="0" cy="0" r="8" fill="#6a4820"/>
    <!-- Spokes (8 main) -->
    <g stroke="#7a5428" stroke-width="3">
      <line x1="0" y1="-12" x2="0" y2="-52"/>
      <line x1="0" y1="12" x2="0" y2="52"/>
      <line x1="-12" y1="0" x2="-52" y2="0"/>
      <line x1="12" y1="0" x2="52" y2="0"/>
      <line x1="-8.5" y1="-8.5" x2="-37" y2="-37"/>
      <line x1="8.5" y1="8.5" x2="37" y2="37"/>
      <line x1="8.5" y1="-8.5" x2="37" y2="-37"/>
      <line x1="-8.5" y1="8.5" x2="-37" y2="37"/>
    </g>
    <!-- Decorative outer notches -->
    <g fill="#7a5428">
      <circle cx="0" cy="-55" r="4"/>
      <circle cx="0" cy="55" r="4"/>
      <circle cx="-55" cy="0" r="4"/>
      <circle cx="55" cy="0" r="4"/>
      <circle cx="-39" cy="-39" r="4"/>
      <circle cx="39" cy="39" r="4"/>
      <circle cx="39" cy="-39" r="4"/>
      <circle cx="-39" cy="39" r="4"/>
      <!-- Between spokes -->
      <circle cx="-21" cy="-51" r="3"/>
      <circle cx="21" cy="-51" r="3"/>
      <circle cx="-21" cy="51" r="3"/>
      <circle cx="21" cy="51" r="3"/>
      <circle cx="-51" cy="-21" r="3"/>
      <circle cx="-51" cy="21" r="3"/>
      <circle cx="51" cy="-21" r="3"/>
      <circle cx="51" cy="21" r="3"/>
    </g>
  </g>

  <!-- Stone chariot horse silhouette -->
  <g fill="#7a5a30" opacity="0.5" transform="translate(120, 290) scale(0.45)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="30" ry="16"/>
    <!-- Neck -->
    <path d="M-22 -10 L-32 -35 L-22 -38 L-14 -15Z"/>
    <!-- Head -->
    <ellipse cx="-30" cy="-40" rx="10" ry="7" transform="rotate(-15 -30 -40)"/>
    <!-- Ears -->
    <path d="M-34 -46 L-32 -54 L-28 -46" fill="#7a5a30"/>
    <!-- Legs -->
    <rect x="-12" y="14" width="5" height="22" rx="1"/>
    <rect x="-2" y="14" width="5" height="22" rx="1"/>
    <rect x="10" y="14" width="5" height="22" rx="1"/>
    <rect x="20" y="14" width="5" height="22" rx="1"/>
    <!-- Tail -->
    <path d="M28 -5 Q38 -12 40 -2" stroke="#7a5a30" stroke-width="2.5" fill="none"/>
    <!-- Mane -->
    <path d="M-26 -25 Q-20 -30 -24 -35" stroke="#7a5a30" stroke-width="2" fill="none"/>
  </g>

  <!-- Casuarina tree line -->
  <g fill="#5a7a48" opacity="0.45">
    <!-- Tall narrow trees -->
    <rect x="500" y="260" width="3" height="60" fill="#4a5a30"/>
    <ellipse cx="501" cy="265" rx="8" ry="20"/>
    <rect x="530" y="255" width="3" height="65" fill="#4a5a30"/>
    <ellipse cx="531" cy="260" rx="9" ry="22"/>
    <rect x="560" y="258" width="3" height="62" fill="#4a5a30"/>
    <ellipse cx="561" cy="263" rx="8" ry="20"/>
    <rect x="590" y="252" width="3" height="68" fill="#4a5a30"/>
    <ellipse cx="591" cy="257" rx="9" ry="22"/>
    <rect x="620" y="256" width="3" height="64" fill="#4a5a30"/>
    <ellipse cx="621" cy="261" rx="8" ry="20"/>
    <rect x="650" y="254" width="3" height="66" fill="#4a5a30"/>
    <ellipse cx="651" cy="259" rx="9" ry="22"/>
    <rect x="680" y="258" width="3" height="62" fill="#4a5a30"/>
    <ellipse cx="681" cy="263" rx="8" ry="20"/>
    <rect x="710" y="260" width="3" height="60" fill="#4a5a30"/>
    <ellipse cx="711" cy="265" rx="8" ry="18"/>
    <rect x="740" y="256" width="3" height="64" fill="#4a5a30"/>
    <ellipse cx="741" cy="261" rx="9" ry="20"/>
    <rect x="770" y="262" width="3" height="58" fill="#4a5a30"/>
    <ellipse cx="771" cy="267" rx="7" ry="18"/>
  </g>

  <!-- Sand texture -->
  <g fill="#b8a068" opacity="0.15">
    <ellipse cx="100" cy="340" rx="40" ry="3"/>
    <ellipse cx="300" cy="350" rx="50" ry="3"/>
    <ellipse cx="500" cy="345" rx="40" ry="2.5"/>
    <ellipse cx="700" cy="338" rx="45" ry="3"/>
  </g>

  <!-- Foreground sand -->
  <path d="M0 380 Q200 374 400 378 Q600 372 800 376 L800 450 L0 450Z" fill="#b8a068" opacity="0.6"/>

  <!-- Sand ripples -->
  <g stroke="#a89058" stroke-width="0.6" opacity="0.25" fill="none">
    <path d="M0 390 Q200 386 400 389 Q600 384 800 388"/>
    <path d="M0 400 Q200 397 400 399 Q600 395 800 398"/>
    <path d="M0 412 Q200 409 400 411 Q600 408 800 410"/>
    <path d="M0 425 Q200 423 400 424 Q600 421 800 423"/>
    <path d="M0 438 Q200 436 400 437 Q600 435 800 436"/>
  </g>

  <!-- Warm golden light flooding -->
  <rect x="0" y="0" width="800" height="180" fill="#f0c050" opacity="0.06"/>
</svg>