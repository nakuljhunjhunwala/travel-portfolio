  <!-- Tea plucker silhouette -->
  <g fill="#2a4a28" opacity="0.6" transform="translate(340, 310) scale(0.5)">
    <!-- Head -->
    <circle cx="0" cy="-48" r="9"/>
    <!-- Hat -->
    <ellipse cx="0" cy="-54" rx="14" ry="5"/>
    <!-- Body bent forward -->
    <path d="M-8 -40 Q-4 -20 -12 0 L12 0 Q8 -20 8 -40Z"/>
    <!-- Legs -->
    <rect x="-10" y="0" width="6" height="20" rx="2"/>
    <rect x="4" y="0" width="6" height="20" rx="2"/>
    <!-- Arms reaching to pluck -->
    <path d="M8 -35 Q20 -28 28 -22" stroke="#2a4a28" stroke-width="3" fill="none"/>
    <path d="M-8 -35 Q-20 -28 -26 -20" stroke="#2a4a28" stroke-width="3" fill="none"/>
    <!-- Basket on back -->
    <path d="M-6 -38 L-10 -15 L10 -15 L6 -38" fill="#5a4a30" opacity="0.8"/>
  </g>

  <!-- One-horned rhino silhouette (small, iconic) -->
  <g fill="#3a5a38" opacity="0.4" transform="translate(650, 340) scale(0.35)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="35" ry="18"/>
    <!-- Head -->
    <ellipse cx="-32" cy="-5" rx="14" ry="10"/>
    <!-- Horn -->
    <path d="M-44 -10 L-46 -22 L-40 -12Z"/>
    <!-- Legs -->
    <rect x="-18" y="15" width="7" height="18" rx="2"/>
    <rect x="-6" y="15" width="7" height="18" rx="2"/>
    <rect x="10" y="15" width="7" height="18" rx="2"/>
    <rect x="22" y="15" width="7" height="18" rx="2"/>
    <!-- Tail -->
    <path d="M34 -2 Q40 -8 42 -4" stroke="#3a5a38" stroke-width="2" fill="none"/>
    <!-- Ear -->
    <ellipse cx="-30" cy="-14" rx="4" ry="5"/>
  </g>

  <!-- Foreground -->
  <path d="M0 370 Q200 360 400 365 Q600 358 800 362 L800 450 L0 450Z" fill="#3a6a38" opacity="0.6"/>
  <path d="M0 400 Q200 392 400 396 Q600 390 800 394 L800 450 L0 450Z" fill="#2a5a28" opacity="0.5"/>

  <!-- Row lines in foreground -->
  <g stroke="#2a5028" stroke-width="0.6" opacity="0.3" fill="none">
    <path d="M0 375 Q200 368 400 372 Q600 366 800 370"/>
    <path d="M0 385 Q200 379 400 382 Q600 377 800 380"/>
    <path d="M0 395 Q200 390 400 393 Q600 388 800 391"/>
    <path d="M0 408 Q200 404 400 406 Q600 402 800 405"/>
    <path d="M0 420 Q200 417 400 418 Q600 415 800 417"/>
