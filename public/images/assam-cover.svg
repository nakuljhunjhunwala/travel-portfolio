    <ellipse cx="100" cy="208" rx="18" ry="5"/>
    <ellipse cx="140" cy="207" rx="18" ry="5"/>
    <ellipse cx="180" cy="208" rx="18" ry="5"/>
    <ellipse cx="220" cy="206" rx="18" ry="5"/>
    <ellipse cx="260" cy="204" rx="18" ry="5"/>
    <ellipse cx="300" cy="202" rx="18" ry="5"/>
    <ellipse cx="340" cy="200" rx="18" ry="5"/>
    <ellipse cx="380" cy="199" rx="18" ry="5"/>
    <ellipse cx="420" cy="200" rx="18" ry="5"/>
