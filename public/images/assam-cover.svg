    <path d="M200 268 Q260 264 320 267"/>
    <path d="M380 262 Q440 258 500 262"/>
    <path d="M550 266 Q610 262 670 266"/>
    <path d="M700 264 Q740 260 780 264"/>
    <path d="M100 280 Q160 276 220 280"/>
