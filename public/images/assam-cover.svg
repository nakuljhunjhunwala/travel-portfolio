  <!-- Near shade tree -->
  <g opacity="0.5">
    <rect x="88" y="355" width="5" height="22" fill="#4a3a20"/>
    <ellipse cx="90" cy="348" rx="18" ry="15" fill="#2a5a28"/>
  </g>

  <!-- Morning mist layers -->
  <g opacity="0.15" fill="#d8e8d0">
    <ellipse cx="300" cy="170" rx="150" ry="12"/>
    <ellipse cx="600" cy="160" rx="120" ry="10"/>
    <ellipse cx="100" cy="175" rx="100" ry="8"/>
  </g>

  <!-- Soft golden sunlight rays -->
  <g stroke="#f0d870" stroke-width="1" opacity="0.08">
    <line x1="160" y1="60" x2="80" y2="350"/>
    <line x1="160" y1="60" x2="200" y2="380"/>
    <line x1="160" y1="60" x2="320" y2="360"/>
    <line x1="160" y1="60" x2="440" y2="340"/>
