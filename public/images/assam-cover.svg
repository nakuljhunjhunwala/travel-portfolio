    <ellipse cx="540" cy="195" rx="18" ry="5"/>
    <ellipse cx="580" cy="196" rx="18" ry="5"/>
    <ellipse cx="620" cy="197" rx="18" ry="5"/>
    <ellipse cx="660" cy="198" rx="18" ry="5"/>
    <ellipse cx="700" cy="196" rx="18" ry="5"/>
    <ellipse cx="740" cy="194" rx="18" ry="5"/>
  </g>

  <!-- Shade trees scattered -->
  <g fill="#3a6a38" opacity="0.55">
    <!-- Tree 1 -->
    <rect x="148" y="192" width="4" height="16" fill="#5a4a30"/>
    <ellipse cx="150" cy="188" rx="14" ry="12"/>
    <!-- Tree 2 -->
    <rect x="388" y="186" width="4" height="16" fill="#5a4a30"/>
    <ellipse cx="390" cy="182" rx="12" ry="10"/>
    <!-- Tree 3 -->
    <rect x="598" y="184" width="4" height="14" fill="#5a4a30"/>
    <ellipse cx="600" cy="180" rx="13" ry="11"/>
    <!-- Tree 4 -->
    <rect x="728" y="182" width="3" height="12" fill="#5a4a30"/>
