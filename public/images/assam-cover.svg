    <ellipse cx="90" cy="316" rx="22" ry="6"/>
    <ellipse cx="140" cy="314" rx="22" ry="6"/>
    <ellipse cx="190" cy="312" rx="22" ry="6"/>
    <ellipse cx="240" cy="310" rx="22" ry="6"/>
    <ellipse cx="290" cy="308" rx="22" ry="6"/>
    <ellipse cx="340" cy="305" rx="22" ry="6"/>
    <ellipse cx="390" cy="303" rx="22" ry="6"/>
    <ellipse cx="440" cy="302" rx="22" ry="6"/>
    <ellipse cx="490" cy="303" rx="22" ry="6"/>
    <ellipse cx="540" cy="302" rx="22" ry="6"/>
    <ellipse cx="590" cy="300" rx="22" ry="6"/>
    <ellipse cx="640" cy="298" rx="22" ry="6"/>
    <ellipse cx="690" cy="296" rx="22" ry="6"/>
    <ellipse cx="740" cy="298" rx="22" ry="6"/>
  </g>

  <!-- Tea bush rows second line -->
  <g fill="#3a7038" opacity="0.5">
    <ellipse cx="60" cy="332" rx="22" ry="6"/>
    <ellipse cx="110" cy="330" rx="22" ry="6"/>
    <ellipse cx="160" cy="328" rx="22" ry="6"/>
    <ellipse cx="210" cy="326" rx="22" ry="6"/>
    <ellipse cx="260" cy="324" rx="22" ry="6"/>
    <ellipse cx="310" cy="322" rx="22" ry="6"/>
    <ellipse cx="360" cy="320" rx="22" ry="6"/>
    <ellipse cx="410" cy="318" rx="22" ry="6"/>
    <ellipse cx="460" cy="317" rx="22" ry="6"/>
    <ellipse cx="510" cy="316" rx="22" ry="6"/>
    <ellipse cx="560" cy="315" rx="22" ry="6"/>
    <ellipse cx="610" cy="314" rx="22" ry="6"/>
    <ellipse cx="660" cy="312" rx="22" ry="6"/>
    <ellipse cx="710" cy="311" rx="22" ry="6"/>
