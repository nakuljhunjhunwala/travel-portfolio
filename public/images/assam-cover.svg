<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="asky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c878"/>
      <stop offset="30%" stop-color="#d4dca0"/>
      <stop offset="60%" stop-color="#a8c8a0"/>
      <stop offset="100%" stop-color="#78a878"/>
    </linearGradient>
    <radialGradient id="asun" cx="0.2" cy="0.15" r="0.25">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#f0e0a0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f0e0a0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ariver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8aaa98"/>
      <stop offset="50%" stop-color="#7a9a88"/>
      <stop offset="100%" stop-color="#6a8a78"/>
    </linearGradient>
    <linearGradient id="amist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8e8d0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d8e8d0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="450" fill="url(#asky)"/>
  <rect width="800" height="450" fill="url(#asun)"/>

  <!-- Misty mountains far background -->
  <path d="M0 130 Q50 95 120 110 Q180 75 260 100 Q320 65 400 90 Q460 60 540 85 Q600 55 680 80 Q740 60 800 75 L800 180 L0 180Z" fill="#7a9a80" opacity="0.35"/>

