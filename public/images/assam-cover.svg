  <!-- Rolling tea garden hills - far -->
  <path d="M0 210 Q100 195 200 205 Q300 190 420 200 Q540 188 650 198 Q740 190 800 195 L800 250 L0 250Z" fill="#5a8a58"/>

  <!-- Tea bush rows far -->
  <g fill="#4a7a48" opacity="0.6">
