<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="msky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a6e5e"/>
      <stop offset="40%" stop-color="#3a8a6a"/>
      <stop offset="70%" stop-color="#4aa878"/>
      <stop offset="100%" stop-color="#266858"/>
    </linearGradient>
    <linearGradient id="mwater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a7a6a"/>
      <stop offset="100%" stop-color="#1a5a4a"/>
    </linearGradient>
    <linearGradient id="mwaterfall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8e8e0" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#a0d8d0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#80c8c0" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="mmist1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0e0d8" stop-opacity="0"/>
      <stop offset="30%" stop-color="#c0e0d8" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#c0e0d8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c0e0d8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="mmisty" cx="0.5" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#d0e8e0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d0e8e0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky / atmosphere -->
  <rect width="800" height="450" fill="url(#msky)"/>
  <rect width="800" height="450" fill="url(#mmisty)"/>

  <!-- Far canopy layer -->
  <path d="M0 120 Q40 100 80 115 Q120 90 160 108 Q200 85 240 105 Q280 82 320 100 Q360 78 400 95 Q440 75 480 98 Q520 80 560 102 Q600 78 640 96 Q680 82 720 100 Q760 88 800 110 L800 200 L0 200Z" fill="#1e5840" opacity="0.6"/>

  <!-- Waterfall in background -->
  <g opacity="0.65">
    <rect x="620" y="90" width="8" height="140" rx="4" fill="url(#mwaterfall)"/>
    <rect x="616" y="92" width="4" height="135" rx="2" fill="#b0dcd4" opacity="0.3"/>
    <rect x="630" y="95" width="3" height="130" rx="1.5" fill="#b0dcd4" opacity="0.25"/>
    <!-- Splash at base -->
    <ellipse cx="624" cy="232" rx="18" ry="6" fill="#a0d0c8" opacity="0.4"/>
    <ellipse cx="624" cy="230" rx="12" ry="4" fill="#c0e0d8" opacity="0.3"/>
  </g>

  <!-- Mid canopy layer -->
  <path d="M0 170 Q50 148 100 165 Q150 140 200 158 Q250 135 300 155 Q350 132 400 150 Q450 128 500 148 Q550 130 600 152 Q650 135 700 155 Q750 140 800 160 L800 260 L0 260Z" fill="#1a5038"/>

  <!-- Gorge walls (left) -->
  <path d="M0 180 L250 180 L300 260 L320 380 L280 450 L0 450Z" fill="#164530" opacity="0.85"/>
  <!-- Gorge walls (right) -->
  <path d="M500 180 L800 180 L800 450 L520 450 L480 380 L500 260Z" fill="#164530" opacity="0.85"/>

  <!-- Canopy on gorge edges -->
  <g fill="#1e5c3e">
    <ellipse cx="180" cy="178" rx="40" ry="18"/>
    <ellipse cx="240" cy="182" rx="35" ry="16"/>
    <ellipse cx="130" cy="175" rx="30" ry="14"/>
    <ellipse cx="80" cy="180" rx="35" ry="16"/>
    <ellipse cx="30" cy="178" rx="30" ry="15"/>
    <ellipse cx="550" cy="178" rx="35" ry="16"/>
    <ellipse cx="620" cy="175" rx="40" ry="18"/>
    <ellipse cx="700" cy="180" rx="35" ry="16"/>
    <ellipse cx="760" cy="177" rx="30" ry="14"/>
  </g>

  <!-- Living root bridge -->
  <g fill="none" stroke="#5a3a20" opacity="0.85">
    <!-- Main bridge structure - thick roots -->
    <path d="M280 270 Q320 295 360 300 Q400 305 440 300 Q480 290 520 268" stroke-width="6" fill="none"/>
    <path d="M280 278 Q320 300 360 308 Q400 313 440 308 Q480 298 520 276" stroke-width="5" fill="none"/>
    <!-- Handrail roots -->
    <path d="M278 255 Q320 270 360 275 Q400 278 440 275 Q480 268 522 252" stroke-width="3.5" fill="none"/>
    <!-- Vertical root connections -->
    <line x1="310" y1="272" x2="308" y2="258" stroke-width="2"/>
    <line x1="340" y1="280" x2="338" y2="265" stroke-width="2"/>
    <line x1="370" y1="285" x2="368" y2="270" stroke-width="2"/>
    <line x1="400" y1="287" x2="398" y2="272" stroke-width="2"/>
    <line x1="430" y1="284" x2="428" y2="269" stroke-width="2"/>
    <line x1="460" y1="278" x2="458" y2="264" stroke-width="2"/>
    <line x1="490" y1="270" x2="488" y2="257" stroke-width="2"/>
    <!-- Cross lattice roots -->
    <line x1="310" y1="258" x2="340" y2="280" stroke-width="1.2" opacity="0.5"/>
    <line x1="340" y1="265" x2="370" y2="285" stroke-width="1.2" opacity="0.5"/>
    <line x1="370" y1="270" x2="400" y2="287" stroke-width="1.2" opacity="0.5"/>
    <line x1="400" y1="272" x2="430" y2="284" stroke-width="1.2" opacity="0.5"/>
    <line x1="430" y1="269" x2="460" y2="278" stroke-width="1.2" opacity="0.5"/>
    <line x1="460" y1="264" x2="490" y2="270" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- Moss on bridge -->
  <g fill="#3a7a50" opacity="0.4">
    <ellipse cx="340" cy="280" rx="8" ry="3"/>
    <ellipse cx="400" cy="287" rx="10" ry="3"/>
    <ellipse cx="460" cy="278" rx="7" ry="3"/>
  </g>

  <!-- River/stream below bridge -->
  <path d="M300 380 Q350 370 400 375 Q450 368 500 378 L510 395 Q450 385 400 390 Q350 385 290 395Z" fill="url(#mwater)" opacity="0.7"/>
  <!-- Water surface highlights -->
  <g stroke="#80c8b8" stroke-width="0.8" opacity="0.35" fill="none">
    <path d="M330 378 Q360 374 390 377"/>
    <path d="M410 375 Q440 371 470 376"/>
    <path d="M350 385 Q380 382 410 385"/>
  </g>

  <!-- Hanging vines from canopy -->
  <g stroke="#2a5a35" fill="none" opacity="0.5">
    <path d="M160 178 Q158 210 162 240 Q160 260 165 280" stroke-width="1.5"/>
    <path d="M220 182 Q218 215 222 248" stroke-width="1.5"/>
    <path d="M100 175 Q98 200 102 225 Q100 245 104 268 Q102 290 106 310" stroke-width="1.2"/>
    <path d="M650 175 Q648 205 652 235 Q650 255 654 278" stroke-width="1.5"/>
    <path d="M580 178 Q578 200 582 225" stroke-width="1.5"/>
    <path d="M720 180 Q718 210 722 240 Q720 265 724 290 Q722 310 726 330" stroke-width="1.2"/>
    <!-- Vine leaves (small dots) -->
    <circle cx="162" cy="260" r="2" fill="#3a7a50"/>
    <circle cx="104" cy="268" r="2" fill="#3a7a50"/>
    <circle cx="654" cy="258" r="2" fill="#3a7a50"/>
    <circle cx="724" cy="290" r="2" fill="#3a7a50"/>
  </g>

  <!-- Deep forest floor -->
  <path d="M0 400 Q100 390 200 395 Q300 388 400 392 Q500 386 600 393 Q700 388 800 395 L800 450 L0 450Z" fill="#0e3520"/>

  <!-- Foreground ferns/plants -->
  <g fill="#1a5535" opacity="0.7">
    <path d="M0 420 Q15 400 30 410 Q45 395 60 408 Q75 392 90 405 L90 450 L0 450Z"/>
    <path d="M710 415 Q725 398 740 408 Q755 393 770 405 Q785 390 800 402 L800 450 L710 450Z"/>
    <path d="M340 430 Q355 415 370 425 Q385 412 400 422 Q415 410 430 420 L430 450 L340 450Z"/>
  </g>

  <!-- Mist wisps -->
  <g opacity="0.2">
    <ellipse cx="400" cy="220" rx="120" ry="12" fill="#c0e0d8"/>
    <ellipse cx="200" cy="200" rx="80" ry="8" fill="#c0e0d8"/>
    <ellipse cx="600" cy="210" rx="90" ry="10" fill="#c0e0d8"/>
    <ellipse cx="100" cy="140" rx="70" ry="8" fill="#c0e0d8"/>
    <ellipse cx="700" cy="145" rx="60" ry="7" fill="#c0e0d8"/>
    <ellipse cx="400" cy="320" rx="100" ry="10" fill="#c0e0d8"/>
  </g>

  <!-- Additional mist layer at gorge -->
  <rect x="260" y="340" width="280" height="30" fill="url(#mmist1)" opacity="0.3"/>

  <!-- Dense canopy top border -->
  <g fill="#143e28" opacity="0.5">
    <ellipse cx="50" cy="115" rx="35" ry="15"/>
    <ellipse cx="150" cy="105" rx="40" ry="16"/>
    <ellipse cx="250" cy="95" rx="35" ry="14"/>
    <ellipse cx="350" cy="88" rx="40" ry="16"/>
    <ellipse cx="450" cy="85" rx="35" ry="15"/>
    <ellipse cx="550" cy="92" rx="40" ry="16"/>
    <ellipse cx="650" cy="88" rx="35" ry="14"/>
    <ellipse cx="750" cy="98" rx="40" ry="16"/>
  </g>
</svg>