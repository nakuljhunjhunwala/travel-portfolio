<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="lksky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3888c8"/>
      <stop offset="40%" stop-color="#60b8e0"/>
      <stop offset="70%" stop-color="#90d8f0"/>
      <stop offset="100%" stop-color="#c0eaf5"/>
    </linearGradient>
    <linearGradient id="lkdeep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1068a0"/>
      <stop offset="50%" stop-color="#0c5888"/>
      <stop offset="100%" stop-color="#084870"/>
    </linearGradient>
    <linearGradient id="lklagoon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#28e0d0"/>
      <stop offset="40%" stop-color="#20d0c8"/>
      <stop offset="100%" stop-color="#18b8b8"/>
    </linearGradient>
    <radialGradient id="lksun" cx="0.5" cy="0.12" r="0.2">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#ffeaa0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffeaa0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lksandy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#40d8c8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e8dcc0" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="450" fill="url(#lksky)"/>
  <rect width="800" height="450" fill="url(#lksun)"/>
  <!-- Clouds -->
  <g opacity="0.4">
    <ellipse cx="650" cy="55" rx="90" ry="22" fill="#fff"/>
    <ellipse cx="690" cy="50" rx="60" ry="16" fill="#fff" opacity="0.7"/>
    <ellipse cx="200" cy="70" rx="75" ry="18" fill="#fff" opacity="0.35"/>
    <ellipse cx="240" cy="65" rx="50" ry="14" fill="#fff" opacity="0.45"/>
  </g>
  <!-- Deep ocean (background) -->
  <path d="M0 200 Q200 195 400 198 Q600 192 800 196 L800 450 L0 450Z" fill="url(#lkdeep)"/>
  <!-- Ring-shaped coral atoll -->
  <path d="M150 260 Q200 220 320 215 Q440 208 540 225 Q620 240 660 270 Q680 290 660 320 Q630 355 540 365 Q420 378 300 368 Q200 352 160 320 Q135 295 150 260Z" fill="#1898a0" opacity="0.6"/>
  <!-- Aquamarine lagoon inside atoll -->
  <path d="M200 275 Q250 245 350 240 Q450 232 530 248 Q590 262 610 285 Q625 305 610 325 Q580 350 500 358 Q400 365 310 355 Q240 342 210 315 Q190 298 200 275Z" fill="url(#lklagoon)" opacity="0.7"/>
  <!-- Sandy bottom visible through clear water -->
  <g opacity="0.2">
    <ellipse cx="380" cy="300" rx="100" ry="35" fill="#e8dcc0"/>
    <ellipse cx="420" cy="310" rx="70" ry="25" fill="#f0e8d0"/>
    <ellipse cx="350" cy="320" rx="50" ry="18" fill="#e0d4b8"/>
  </g>
  <!-- Atoll reef rim (coral ring) -->
  <g opacity="0.45">
    <path d="M155 262 Q200 225 320 218 Q440 212 545 228 Q625 245 662 272" stroke="#e8c888" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M662 272 Q682 295 662 322 Q632 358 542 368 Q420 380 298 370 Q198 354 158 320 Q138 298 155 262" stroke="#e8c888" stroke-width="8" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Pristine white sand bar -->
  <path d="M290 230 Q340 218 420 222 Q480 218 520 228 Q540 235 530 245 Q490 252 420 250 Q340 254 310 248 Q285 242 290 230Z" fill="#faf6ec" opacity="0.9"/>
  <path d="M300 235 Q350 225 410 228 Q460 224 500 232 Q515 238 508 244 Q470 248 410 246 Q350 250 320 244 Q296 240 300 235Z" fill="#fff" opacity="0.5"/>
  <!-- Coconut palms on sand bar -->
  <g opacity="0.7">
    <line x1="370" y1="235" x2="362" y2="175" stroke="#4a7838" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M362 175 Q340 162 325 172" stroke="#2a8040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M362 175 Q378 158 395 168" stroke="#2a8040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M362 178 Q345 168 335 180" stroke="#328848" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M362 178 Q380 165 392 178" stroke="#328848" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M362 182 Q350 175 342 185" stroke="#3a9050" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M362 182 Q375 172 385 182" stroke="#3a9050" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
  <g opacity="0.6">
    <line x1="440" y1="232" x2="448" y2="178" stroke="#4a7838" stroke-width="3" stroke-linecap="round"/>
    <path d="M448 178 Q430 165 418 175" stroke="#2a8040" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M448 178 Q465 162 478 172" stroke="#2a8040" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M448 182 Q435 172 425 183" stroke="#328848" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M448 182 Q462 170 472 182" stroke="#328848" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <g opacity="0.5">
    <line x1="490" y1="235" x2="498" y2="190" stroke="#4a7838" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M498 190 Q482 180 475 190" stroke="#2a8040" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M498 190 Q512 178 522 188" stroke="#2a8040" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M498 194 Q488 186 480 195" stroke="#328848" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Traditional fishing dhow -->
  <g transform="translate(620, 300)" opacity="0.55">
    <!-- Hull -->
    <path d="M-28 5 Q-32 12 -25 14 L30 14 Q35 12 32 5 Z" fill="#6a4828"/>
    <!-- Mast -->
    <line x1="5" y1="14" x2="5" y2="-30" stroke="#5a4020" stroke-width="2" stroke-linecap="round"/>
    <!-- Sail -->
    <path d="M5 -28 L28 8 L5 8 Z" fill="#e8d8c0" opacity="0.8"/>
    <path d="M5 -28 L-12 8 L5 8 Z" fill="#dcc8a8" opacity="0.6"/>
  </g>
  <!-- Water shimmer and reflections -->
  <g opacity="0.15">
    <ellipse cx="400" cy="330" rx="80" ry="2" fill="#fff"/>
    <ellipse cx="300" cy="370" rx="60" ry="1.8" fill="#fff"/>
    <ellipse cx="520" cy="355" rx="70" ry="2" fill="#fff"/>
    <ellipse cx="200" cy="390" rx="50" ry="1.5" fill="#fff"/>
  </g>
  <!-- Deep water in foreground -->
  <path d="M0 380 Q200 372 400 376 Q600 368 800 374 L800 450 L0 450Z" fill="#063858" opacity="0.35"/>
  <path d="M0 415 Q200 408 400 412 Q600 406 800 410 L800 450 L0 450Z" fill="#052848" opacity="0.25"/>
  <!-- Birds -->
  <g stroke="#2a6888" stroke-width="1.2" fill="none" opacity="0.25">
    <path d="M300 110 Q305 104 310 110 Q315 104 320 110"/>
    <path d="M340 98 Q344 93 348 98 Q352 93 356 98"/>
    <path d="M280 125 Q284 120 288 125 Q292 120 296 125"/>
  </g>
</svg>