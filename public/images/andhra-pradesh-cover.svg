<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="apsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a6aaa"/>
      <stop offset="30%" stop-color="#6a9ac8"/>
      <stop offset="55%" stop-color="#d8a870"/>
      <stop offset="80%" stop-color="#e8a050"/>
      <stop offset="100%" stop-color="#d08040"/>
    </linearGradient>
    <radialGradient id="apsun" cx="0.5" cy="0.42" r="0.2">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#f0d090" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f0d090" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aphill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a7a50"/>
      <stop offset="100%" stop-color="#3a6a40"/>
    </linearGradient>
    <linearGradient id="apmist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c890" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e8c890" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="450" fill="url(#apsky)"/>
  <rect width="800" height="450" fill="url(#apsun)"/>

  <!-- Seven Hills silhouette (Tirupati-style) -->
  <!-- Hill 1 - far left -->
  <path d="M0 220 Q40 180 90 195 Q120 175 160 200 L160 260 L0 260Z" fill="#5a7a58" opacity="0.45"/>
  <!-- Hill 2 -->
  <path d="M120 210 Q170 170 220 190 L250 260 L100 260Z" fill="#507050" opacity="0.5"/>
  <!-- Hill 3 -->
  <path d="M210 200 Q270 155 330 180 L360 260 L190 260Z" fill="#486848" opacity="0.55"/>
  <!-- Hill 4 - central, tallest -->
  <path d="M300 190 Q370 130 440 165 Q470 148 500 175 L530 260 L270 260Z" fill="#406040" opacity="0.6"/>
  <!-- Hill 5 -->
  <path d="M470 185 Q530 150 590 178 L620 260 L440 260Z" fill="#486848" opacity="0.55"/>
  <!-- Hill 6 -->
  <path d="M570 195 Q630 165 690 188 L710 260 L550 260Z" fill="#507050" opacity="0.5"/>
  <!-- Hill 7 - far right -->
  <path d="M660 205 Q720 175 780 195 Q800 185 800 195 L800 260 L640 260Z" fill="#5a7a58" opacity="0.45"/>

  <!-- Dense forest on hillsides -->
  <g fill="#3a5a38" opacity="0.4">
    <circle cx="80" cy="210" r="8"/>
    <circle cx="100" cy="205" r="9"/>
    <circle cx="160" cy="200" r="8"/>
    <circle cx="180" cy="205" r="9"/>
    <circle cx="230" cy="192" r="8"/>
    <circle cx="260" cy="195" r="9"/>
    <circle cx="310" cy="185" r="10"/>
    <circle cx="340" cy="178" r="9"/>
    <circle cx="370" cy="165" r="8"/>
    <circle cx="400" cy="160" r="9"/>
    <circle cx="430" cy="168" r="8"/>
    <circle cx="460" cy="172" r="9"/>
    <circle cx="500" cy="178" r="8"/>
    <circle cx="540" cy="175" r="9"/>
    <circle cx="570" cy="182" r="8"/>
    <circle cx="610" cy="178" r="9"/>
    <circle cx="650" cy="188" r="8"/>
    <circle cx="690" cy="192" r="9"/>
    <circle cx="730" cy="190" r="8"/>
    <circle cx="770" cy="198" r="7"/>
  </g>

  <!-- Temple gopuram silhouette on central hill -->
  <g fill="#3a5035" opacity="0.65" transform="translate(395, 148) scale(0.55)">
    <!-- Base -->
    <rect x="-20" y="0" width="40" height="20" rx="1"/>
    <!-- Tier 1 -->
    <rect x="-17" y="-15" width="34" height="18" rx="1"/>
    <!-- Tier 2 -->
    <rect x="-14" y="-28" width="28" height="16" rx="1"/>
    <!-- Tier 3 -->
    <rect x="-10" y="-40" width="20" height="14" rx="1"/>
    <!-- Top dome -->
    <ellipse cx="0" cy="-44" rx="8" ry="6"/>
    <!-- Kalasham -->
    <rect x="-1.5" y="-54" width="3" height="10" rx="1"/>
    <circle cx="0" cy="-56" r="2.5"/>
    <!-- Gopuram detail lines -->
    <line x1="-17" y1="-8" x2="17" y2="-8" stroke="#2a4028" stroke-width="0.5" opacity="0.5"/>
    <line x1="-14" y1="-20" x2="14" y2="-20" stroke="#2a4028" stroke-width="0.5" opacity="0.5"/>
    <line x1="-10" y1="-32" x2="10" y2="-32" stroke="#2a4028" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- Morning mist in valleys -->
  <g opacity="0.2" fill="#e8d8c0">
    <ellipse cx="160" cy="240" rx="50" ry="12"/>
    <ellipse cx="350" cy="245" rx="60" ry="14"/>
    <ellipse cx="550" cy="242" rx="55" ry="12"/>
    <ellipse cx="720" cy="248" rx="45" ry="10"/>
  </g>
  <rect x="0" y="230" width="800" height="25" fill="url(#apmist)"/>

  <!-- Winding road/steps going up the hill -->
  <g stroke="#8a7a60" stroke-width="2" fill="none" opacity="0.35">
    <path d="M350 350 Q340 330 360 310 Q380 290 370 270 Q355 250 375 230 Q390 210 385 190 Q375 175 395 160"/>
    <!-- Path width second line -->
    <path d="M356 350 Q346 330 366 310 Q386 290 376 270 Q361 250 381 230 Q396 210 391 190 Q381 175 401 160" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Steps dots along path -->
  <g fill="#8a7a60" opacity="0.2">
    <circle cx="352" cy="340" r="1.5"/>
    <circle cx="348" cy="325" r="1.5"/>
    <circle cx="358" cy="312" r="1.5"/>
    <circle cx="375" cy="298" r="1.5"/>
    <circle cx="372" cy="278" r="1.5"/>
    <circle cx="360" cy="258" r="1.5"/>
    <circle cx="374" cy="238" r="1.5"/>
    <circle cx="388" cy="218" r="1.5"/>
    <circle cx="386" cy="198" r="1.5"/>
  </g>

  <!-- Mid-ground forest/hill -->
  <path d="M0 280 Q100 265 200 272 Q300 258 400 268 Q500 255 600 265 Q700 252 800 260 L800 330 L0 330Z" fill="#3a6a3a" opacity="0.5"/>

  <!-- Trees on mid-ground -->
  <g fill="#2a5a2a" opacity="0.4">
    <circle cx="50" cy="278" r="10"/>
    <circle cx="80" cy="275" r="11"/>
    <circle cx="150" cy="270" r="10"/>
    <circle cx="250" cy="265" r="11"/>
    <circle cx="350" cy="262" r="10"/>
    <circle cx="450" cy="260" r="11"/>
    <circle cx="550" cy="262" r="10"/>
    <circle cx="650" cy="258" r="11"/>
    <circle cx="750" cy="256" r="10"/>
  </g>

  <!-- Near forested ground -->
  <path d="M0 330 Q150 320 300 325 Q450 315 600 322 Q700 314 800 318 L800 380 L0 380Z" fill="#2a5a2a"/>

  <!-- Foreground -->
  <path d="M0 380 Q200 372 400 376 Q600 370 800 374 L800 450 L0 450Z" fill="#1e4a1e" opacity="0.7"/>

  <!-- Near trees -->
  <g opacity="0.5">
    <rect x="68" y="345" width="4" height="25" fill="#3a2a18"/>
    <ellipse cx="70" cy="340" rx="14" ry="12" fill="#2a5028"/>
    <rect x="698" y="338" width="5" height="28" fill="#3a2a18"/>
    <ellipse cx="700" cy="332" rx="16" ry="14" fill="#2a5028"/>
  </g>

  <!-- Ground texture -->
  <path d="M0 420 Q200 414 400 418 Q600 412 800 416 L800 450 L0 450Z" fill="#163a16" opacity="0.5"/>

  <!-- Birds -->
  <g stroke="#4a3a20" stroke-width="1.2" fill="none" opacity="0.3">
    <path d="M200 100 Q205 94 210 100 Q215 94 220 100"/>
    <path d="M240 88 Q244 83 248 88 Q252 83 256 88"/>
    <path d="M180 112 Q184 107 188 112 Q192 107 196 112"/>
    <path d="M260 105 Q263 100 266 105 Q269 100 272 105"/>
    <path d="M600 85 Q604 80 608 85 Q612 80 616 85"/>
    <path d="M630 95 Q633 90 636 95 Q639 90 642 95"/>
  </g>

  <!-- Warm golden light flood -->
  <rect x="0" y="180" width="800" height="80" fill="#e8a040" opacity="0.06"/>
</svg>