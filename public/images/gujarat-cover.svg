<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="gjsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a3a"/>
      <stop offset="25%" stop-color="#3a2a5a"/>
      <stop offset="50%" stop-color="#6a3a6a"/>
      <stop offset="75%" stop-color="#a05070"/>
      <stop offset="100%" stop-color="#d08080"/>
    </linearGradient>
    <radialGradient id="gjglow" cx="0.5" cy="0.85" r="0.4">
      <stop offset="0%" stop-color="#d0a0a0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d08080" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gjsalt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0d8d0"/>
      <stop offset="50%" stop-color="#f0ece8"/>
      <stop offset="100%" stop-color="#e8e0d8"/>
    </linearGradient>
    <linearGradient id="gjreflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a5a6a" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#5a3a4a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3a2a3a" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="450" fill="url(#gjsky)"/>
  <!-- Horizon glow -->
  <rect width="800" height="450" fill="url(#gjglow)"/>
  <!-- Stars -->
  <g fill="#fff">
    <circle cx="80" cy="35" r="1.3" opacity="0.6"/>
    <circle cx="150" cy="60" r="0.8" opacity="0.4"/>
    <circle cx="230" cy="25" r="1.1" opacity="0.5"/>
    <circle cx="320" cy="50" r="0.9" opacity="0.35"/>
    <circle cx="420" cy="30" r="1.2" opacity="0.55"/>
    <circle cx="510" cy="55" r="0.7" opacity="0.3"/>
    <circle cx="580" cy="20" r="1.0" opacity="0.5"/>
    <circle cx="660" cy="45" r="1.3" opacity="0.6"/>
    <circle cx="740" cy="30" r="0.8" opacity="0.4"/>
    <circle cx="110" cy="90" r="0.7" opacity="0.3"/>
    <circle cx="280" cy="80" r="1.0" opacity="0.4"/>
    <circle cx="450" cy="75" r="0.6" opacity="0.25"/>
    <circle cx="600" cy="85" r="0.9" opacity="0.35"/>
    <circle cx="700" cy="65" r="1.1" opacity="0.45"/>
    <circle cx="50" cy="110" r="0.8" opacity="0.3"/>
    <circle cx="370" cy="100" r="0.7" opacity="0.25"/>
    <circle cx="550" cy="105" r="0.9" opacity="0.3"/>
    <circle cx="180" cy="115" r="0.6" opacity="0.2"/>
    <circle cx="480" cy="15" r="1.0" opacity="0.45"/>
    <circle cx="760" cy="90" r="0.8" opacity="0.35"/>
  </g>
  <!-- Crescent moon -->
  <g transform="translate(650, 80)">
    <circle cx="0" cy="0" r="18" fill="#f0e8d0" opacity="0.85"/>
    <circle cx="7" cy="-4" r="16" fill="url(#gjsky)"/>
    <!-- Moon glow -->
    <circle cx="0" cy="0" r="28" fill="#f0e8d0" opacity="0.06"/>
    <circle cx="0" cy="0" r="22" fill="#f0e8d0" opacity="0.08"/>
  </g>
  <!-- Distant horizon line -->
  <line x1="0" y1="260" x2="800" y2="260" stroke="#c0a8a0" stroke-width="0.5" opacity="0.3"/>
  <!-- Salt desert -->
  <rect x="0" y="260" width="800" height="190" fill="url(#gjsalt)" opacity="0.85"/>
  <!-- Salt crystal texture (subtle dots/sparkle) -->
  <g fill="#fff" opacity="0.15">
    <circle cx="50" cy="290" r="0.8"/>
    <circle cx="120" cy="310" r="0.6"/>
    <circle cx="200" cy="285" r="0.9"/>
    <circle cx="280" cy="320" r="0.7"/>
    <circle cx="350" cy="295" r="0.8"/>
    <circle cx="430" cy="315" r="0.6"/>
    <circle cx="500" cy="288" r="0.9"/>
    <circle cx="570" cy="305" r="0.7"/>
    <circle cx="640" cy="292" r="0.8"/>
    <circle cx="710" cy="318" r="0.6"/>
    <circle cx="780" cy="298" r="0.7"/>
    <circle cx="90" cy="340" r="0.5"/>
    <circle cx="160" cy="355" r="0.7"/>
    <circle cx="240" cy="348" r="0.6"/>
    <circle cx="330" cy="360" r="0.8"/>
    <circle cx="410" cy="345" r="0.5"/>
    <circle cx="490" cy="370" r="0.7"/>
    <circle cx="560" cy="352" r="0.6"/>
    <circle cx="650" cy="365" r="0.5"/>
    <circle cx="730" cy="358" r="0.7"/>
    <circle cx="380" cy="385" r="0.6"/>
    <circle cx="520" cy="395" r="0.5"/>
    <circle cx="180" cy="390" r="0.7"/>
    <circle cx="680" cy="400" r="0.6"/>
  </g>
  <!-- Mirror reflection of sky on salt flat -->
  <rect x="0" y="260" width="800" height="190" fill="url(#gjreflect)"/>
  <!-- Subtle reflection lines -->
  <g opacity="0.08">
    <path d="M0 280 Q200 277 400 280 Q600 276 800 279" stroke="#c0a0a8" stroke-width="0.8" fill="none"/>
    <path d="M0 300 Q200 297 400 300 Q600 296 800 299" stroke="#c0a0a8" stroke-width="0.6" fill="none"/>
    <path d="M0 320 Q200 318 400 320 Q600 317 800 319" stroke="#c0a0a8" stroke-width="0.5" fill="none"/>
  </g>
  <!-- Bhunga (round hut with decorated walls) silhouette -->
  <g transform="translate(300, 258)" fill="#4a3a3a" opacity="0.45">
    <!-- Round hut body -->
    <ellipse cx="0" cy="0" rx="22" ry="14"/>
    <!-- Conical thatched roof -->
    <path d="M-25 -4 Q0 -30 25 -4Z" fill="#3a2a2a"/>
    <!-- Door -->
    <ellipse cx="0" cy="4" rx="5" ry="7" fill="#2a1a1a" opacity="0.5"/>
    <!-- Decoration dots on wall -->
    <g fill="#5a4a4a" opacity="0.4">
      <circle cx="-12" cy="-2" r="1"/>
      <circle cx="-8" cy="-5" r="1"/>
      <circle cx="8" cy="-5" r="1"/>
      <circle cx="12" cy="-2" r="1"/>
    </g>
  </g>
  <!-- Small second bhunga (distant) -->
  <g transform="translate(380, 256)" fill="#4a3a3a" opacity="0.25">
    <ellipse cx="0" cy="0" rx="12" ry="8"/>
    <path d="M-14 -2 Q0 -18 14 -2Z" fill="#3a2a2a"/>
  </g>
  <!-- Reflection of bhunga on salt flat -->
  <g transform="translate(300, 262) scale(1, -0.3)" opacity="0.1">
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="#4a3a3a"/>
    <path d="M-25 -4 Q0 -30 25 -4Z" fill="#3a2a2a"/>
  </g>
  <!-- Horizon haze -->
  <ellipse cx="400" cy="260" rx="420" ry="10" fill="#c0a8a0" opacity="0.15"/>
  <!-- Foreground salt crust detail -->
  <g stroke="#d0c8c0" stroke-width="0.3" opacity="0.15" fill="none">
    <path d="M0 400 Q40 398 80 400 Q120 397 160 400"/>
    <path d="M200 410 Q240 408 280 410 Q320 407 360 410"/>
    <path d="M400 405 Q440 402 480 405 Q520 401 560 405"/>
    <path d="M600 415 Q640 412 680 415 Q720 411 760 415"/>
    <path d="M100 420 Q140 418 180 420 Q220 416 260 420"/>
    <path d="M450 425 Q490 422 530 425 Q570 420 610 425"/>
  </g>
</svg>