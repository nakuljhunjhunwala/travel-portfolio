<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="mpsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ab0c8"/>
      <stop offset="35%" stop-color="#a0ccd8"/>
      <stop offset="65%" stop-color="#c8e0e0"/>
      <stop offset="100%" stop-color="#d8eae0"/>
    </linearGradient>
    <linearGradient id="mplake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#88b8b0" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#6aa098" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#5a9088" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="mpmist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0e0d8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#d0e0d8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="mpsunglow" cx="0.3" cy="0.2" r="0.35">
      <stop offset="0%" stop-color="#f0e8d0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f0e8d0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="450" fill="url(#mpsky)"/>
  <rect width="800" height="450" fill="url(#mpsunglow)"/>

  <!-- Morning mist at top -->
  <rect x="0" y="100" width="800" height="60" fill="url(#mpmist)"/>

  <!-- Far mountains -->
  <path d="M0 170 L60 130 L120 155 L180 110 L240 140 L310 100 L380 130 L440 95 L500 125 L560 90 L620 118 L680 85 L740 110 L800 95 L800 200 L0 200Z" fill="#8aa098" opacity="0.4"/>

  <!-- Mid mountains -->
  <path d="M0 210 L80 180 L160 200 L240 170 L320 192 L400 165 L480 188 L560 162 L640 185 L720 168 L800 180 L800 240 L0 240Z" fill="#6a8878" opacity="0.5"/>

  <!-- Shore vegetation -->
  <path d="M0 240 Q100 232 200 238 Q300 228 400 236 Q500 226 600 234 Q700 228 800 232 L800 260 L0 260Z" fill="#5a8060" opacity="0.4"/>

  <!-- Lake surface -->
  <rect x="0" y="255" width="800" height="195" fill="url(#mplake)"/>

  <!-- Mountain reflections -->
  <path d="M0 280 Q100 295 200 285 Q300 300 400 288 Q500 302 600 290 Q700 298 800 292 L800 310 L0 310Z" fill="#7a9a90" opacity="0.15"/>

  <!-- Floating phumdi island 1 (large, center-left) -->
  <g transform="translate(220, 310)">
    <ellipse cx="0" cy="0" rx="55" ry="12" fill="#4a8048" opacity="0.6"/>
    <ellipse cx="0" cy="2" rx="50" ry="8" fill="#5a9058" opacity="0.5"/>
    <!-- Grass tufts on phumdi -->
    <g fill="#3a6838" opacity="0.7">
      <path d="M-30 -4 Q-28 -14 -26 -4"/>
      <path d="M-20 -5 Q-18 -16 -16 -5"/>
      <path d="M-8 -4 Q-5 -15 -2 -4"/>
      <path d="M5 -5 Q8 -17 11 -5"/>
      <path d="M20 -4 Q22 -14 24 -4"/>
      <path d="M32 -5 Q34 -15 36 -5"/>
    </g>
  </g>

  <!-- Floating phumdi island 2 (with fishing hut) -->
  <g transform="translate(480, 320)">
    <ellipse cx="0" cy="0" rx="45" ry="10" fill="#4a8048" opacity="0.55"/>
    <ellipse cx="0" cy="2" rx="40" ry="7" fill="#5a9058" opacity="0.45"/>
    <!-- Fishing hut -->
    <g fill="#5a4a3a" opacity="0.65">
      <rect x="-10" y="-16" width="20" height="14" rx="1"/>
      <path d="M-13 -16 L0 -26 L13 -16Z" fill="#6a5a48"/>
      <!-- Door -->
      <rect x="-3" y="-10" width="6" height="12" fill="#3a2a1a" opacity="0.5"/>
    </g>
    <!-- Stilts -->
    <line x1="-8" y1="-2" x2="-8" y2="4" stroke="#5a4a3a" stroke-width="1.5" opacity="0.5"/>
    <line x1="8" y1="-2" x2="8" y2="4" stroke="#5a4a3a" stroke-width="1.5" opacity="0.5"/>
    <!-- Grass tufts -->
    <g fill="#3a6838" opacity="0.6">
      <path d="M-25 -3 Q-23 -12 -21 -3"/>
      <path d="M20 -3 Q22 -13 24 -3"/>
      <path d="M30 -2 Q32 -11 34 -2"/>
    </g>
  </g>

  <!-- Floating phumdi island 3 (small, right) -->
  <g transform="translate(660, 340)">
    <ellipse cx="0" cy="0" rx="30" ry="8" fill="#4a8048" opacity="0.5"/>
    <ellipse cx="0" cy="2" rx="26" ry="5" fill="#5a9058" opacity="0.4"/>
    <g fill="#3a6838" opacity="0.55">
      <path d="M-15 -2 Q-13 -10 -11 -2"/>
      <path d="M0 -3 Q2 -12 4 -3"/>
      <path d="M12 -2 Q14 -10 16 -2"/>
    </g>
  </g>

  <!-- Floating phumdi island 4 (small, far left) -->
  <g transform="translate(80, 300)">
    <ellipse cx="0" cy="0" rx="25" ry="7" fill="#4a8048" opacity="0.45"/>
    <g fill="#3a6838" opacity="0.5">
      <path d="M-10 -2 Q-8 -10 -6 -2"/>
      <path d="M5 -2 Q7 -11 9 -2"/>
    </g>
  </g>

  <!-- Water hyacinth patches -->
  <g fill="#5a9060" opacity="0.3">
    <ellipse cx="350" cy="360" rx="18" ry="5"/>
    <ellipse cx="370" cy="365" rx="12" ry="4"/>
    <ellipse cx="140" cy="370" rx="15" ry="4"/>
    <ellipse cx="550" cy="375" rx="14" ry="4"/>
    <ellipse cx="720" cy="365" rx="10" ry="3"/>
  </g>

  <!-- Sangai deer silhouette (foreground left, on a phumdi edge) -->
  <g transform="translate(120, 375)" fill="#2a4a2a" opacity="0.5">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="16" ry="8"/>
    <!-- Neck + head -->
    <path d="M-12 -5 Q-15 -18 -12 -22"/>
    <ellipse cx="-11" cy="-22" rx="4" ry="3.5"/>
    <line x1="-12" y1="-5" x2="-12" y2="-22" stroke="#2a4a2a" stroke-width="3"/>
    <!-- Antlers -->
    <path d="M-13 -24 Q-16 -32 -18 -34" fill="none" stroke="#2a4a2a" stroke-width="1.5"/>
    <path d="M-10 -24 Q-8 -32 -6 -34" fill="none" stroke="#2a4a2a" stroke-width="1.5"/>
    <path d="M-17 -30 Q-20 -32 -22 -31" fill="none" stroke="#2a4a2a" stroke-width="1"/>
    <path d="M-7 -30 Q-4 -32 -2 -31" fill="none" stroke="#2a4a2a" stroke-width="1"/>
    <!-- Legs -->
    <line x1="-8" y1="6" x2="-9" y2="18" stroke="#2a4a2a" stroke-width="2.5"/>
    <line x1="-2" y1="6" x2="-1" y2="18" stroke="#2a4a2a" stroke-width="2.5"/>
    <line x1="6" y1="6" x2="5" y2="18" stroke="#2a4a2a" stroke-width="2.5"/>
    <line x1="12" y1="6" x2="13" y2="18" stroke="#2a4a2a" stroke-width="2.5"/>
    <!-- Tail -->
    <path d="M16 -2 Q20 -5 19 0" fill="#2a4a2a"/>
  </g>

  <!-- Water ripples -->
  <g stroke="#a0c8c0" stroke-width="0.5" fill="none" opacity="0.12">
    <ellipse cx="250" cy="350" rx="30" ry="3"/>
    <ellipse cx="500" cy="370" rx="25" ry="2.5"/>
    <ellipse cx="400" cy="400" rx="35" ry="3"/>
    <ellipse cx="150" cy="420" rx="28" ry="2.5"/>
    <ellipse cx="650" cy="390" rx="20" ry="2"/>
    <ellipse cx="350" cy="430" rx="32" ry="2.5"/>
  </g>

  <!-- Soft morning mist on lake -->
  <rect x="0" y="260" width="800" height="30" fill="#d0e0d8" opacity="0.12"/>
</svg>