<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="lsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="35%" stop-color="#3a5a8a"/>
      <stop offset="70%" stop-color="#6a8ab0"/>
      <stop offset="100%" stop-color="#90aac5"/>
    </linearGradient>
    <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a6a9a"/>
      <stop offset="100%" stop-color="#2a4a70"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#lsky)"/>
  <!-- Stars -->
  <g fill="white" opacity="0.4">
    <circle cx="120" cy="40" r="1.2"/><circle cx="250" cy="25" r="0.8"/>
    <circle cx="380" cy="50" r="1"/><circle cx="500" cy="30" r="1.3"/>
    <circle cx="620" cy="45" r="0.9"/><circle cx="700" cy="22" r="1.1"/>
    <circle cx="180" cy="70" r="0.7"/><circle cx="450" cy="65" r="0.9"/>
    <circle cx="560" cy="15" r="0.8"/><circle cx="340" cy="38" r="1"/>
    <circle cx="80" cy="58" r="0.6"/><circle cx="750" cy="55" r="0.7"/>
  </g>
  <!-- Far snow mountains -->
  <path d="M0 220 L60 150 L120 190 L200 120 L280 170 L360 100 L440 155 L520 85 L600 145 L680 110 L760 160 L800 130 L800 260 L0 260Z" fill="#7a90a8" opacity="0.5"/>
  <!-- Snow caps -->
  <path d="M200 120 L220 148 L210 148 L230 170 Z" fill="#d8e4f0" opacity="0.5"/>
  <path d="M360 100 L380 132 L370 132 L392 158 Z" fill="#d8e4f0" opacity="0.5"/>
  <path d="M520 85 L542 120 L530 120 L555 150 Z" fill="#d8e4f0" opacity="0.55"/>
  <path d="M680 110 L698 138 L690 138 L710 160 Z" fill="#d8e4f0" opacity="0.45"/>
  <!-- Mid barren mountains -->
  <path d="M0 280 L80 220 L160 255 L250 200 L340 245 L430 210 L520 248 L610 215 L700 250 L800 225 L800 310 L0 310Z" fill="#6a7a6a"/>
  <!-- Monastery silhouette -->
  <g fill="#555a50" opacity="0.45" transform="translate(600, 210)">
    <rect x="0" y="0" width="40" height="35" rx="2"/>
    <rect x="8" y="-12" width="24" height="12" rx="1"/>
    <rect x="14" y="-20" width="12" height="8" rx="1"/>
    <!-- Prayer flags line -->
    <line x1="-20" y1="-15" x2="60" y2="-22" stroke="#888" stroke-width="0.8" opacity="0.5"/>
    <g fill="none" stroke-width="0.6" opacity="0.4">
      <rect x="-12" y="-18" width="4" height="6" stroke="#c44"/><rect x="-4" y="-17" width="4" height="6" stroke="#cc8"/>
      <rect x="4" y="-19" width="4" height="6" stroke="#4a4"/><rect x="42" y="-21" width="4" height="6" stroke="#48c"/>
      <rect x="50" y="-22" width="4" height="6" stroke="#c84"/>
    </g>
  </g>
  <!-- Lake (Pangong-like) -->
  <path d="M0 330 Q200 310 400 320 Q600 308 800 318 L800 400 Q600 385 400 392 Q200 382 0 395Z" fill="url(#lake)" opacity="0.7"/>
  <!-- Lake shimmer -->
  <g opacity="0.12">
    <ellipse cx="300" cy="350" rx="100" ry="2.5" fill="#8ab8e0"/>
    <ellipse cx="550" cy="360" rx="80" ry="2" fill="#8ab8e0"/>
    <ellipse cx="180" cy="370" rx="60" ry="1.5" fill="#8ab8e0"/>
    <ellipse cx="650" cy="345" rx="70" ry="2" fill="#8ab8e0"/>
  </g>
  <!-- Mountain reflections in lake -->
  <path d="M0 395 Q200 382 400 392 Q600 380 800 390 L800 400 L0 400Z" fill="#4a6a5a" opacity="0.2"/>
  <!-- Foreground barren land -->
  <path d="M0 400 Q150 392 350 398 Q550 388 800 396 L800 450 L0 450Z" fill="#6a7060"/>
  <!-- Road winding through -->
  <path d="M0 430 Q100 418 200 425 Q350 415 500 422 Q650 412 800 420" stroke="#8a8878" stroke-width="2.5" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M0 434 Q100 422 200 429 Q350 419 500 426 Q650 416 800 424" stroke="#8a8878" stroke-width="1.5" fill="none" opacity="0.2" stroke-linecap="round" stroke-dasharray="8 6"/>
</svg>
