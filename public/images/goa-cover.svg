<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="gsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b3fa0"/>
      <stop offset="25%" stop-color="#c2548a"/>
      <stop offset="50%" stop-color="#e87a5a"/>
      <stop offset="75%" stop-color="#f2a860"/>
      <stop offset="100%" stop-color="#f8d488"/>
    </linearGradient>
    <radialGradient id="gsun" cx="0.5" cy="0.62" r="0.22">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="1"/>
      <stop offset="30%" stop-color="#ffcc55" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#f2a040" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e87a5a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d08850"/>
      <stop offset="40%" stop-color="#5a8aaa"/>
      <stop offset="100%" stop-color="#3a6a8a"/>
    </linearGradient>
    <linearGradient id="gsunReflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcc55" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffcc55" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="450" fill="url(#gsky)"/>
  <!-- Sun glow -->
  <rect width="800" height="450" fill="url(#gsun)"/>
  <!-- Sun disc -->
  <circle cx="400" cy="280" r="35" fill="#ffe880" opacity="0.9"/>
  <circle cx="400" cy="280" r="28" fill="#fff5cc" opacity="0.6"/>
  <!-- Clouds -->
  <g opacity="0.15">
    <ellipse cx="180" cy="100" rx="80" ry="18" fill="#ffd8a8"/>
    <ellipse cx="620" cy="80" rx="65" ry="14" fill="#ffd8a8"/>
    <ellipse cx="450" cy="130" rx="50" ry="10" fill="#ffd8a8"/>
  </g>
  <!-- Birds -->
  <g stroke="#8a5570" stroke-width="1.3" fill="none" opacity="0.3">
    <path d="M250 120 Q255 113 260 120 Q265 113 270 120"/>
    <path d="M290 105 Q294 99 298 105 Q302 99 306 105"/>
    <path d="M220 140 Q224 134 228 140 Q232 134 236 140"/>
    <path d="M510 95 Q514 89 518 95 Q522 89 526 95"/>
    <path d="M480 115 Q484 110 488 115 Q492 110 496 115"/>
  </g>
  <!-- Distant fishing boat -->
  <g transform="translate(580, 272)" opacity="0.4">
    <path d="M-12 4 Q-14 8 -10 9 L14 9 Q16 8 14 4 Z" fill="#5a3a3a"/>
    <line x1="2" y1="4" x2="2" y2="-8" stroke="#5a3a3a" stroke-width="1.5"/>
    <path d="M2 -8 Q8 -4 2 0" fill="#7a5050" opacity="0.6"/>
  </g>
  <!-- Ocean -->
  <path d="M0 290 Q200 282 400 288 Q600 280 800 286 L800 450 L0 450Z" fill="url(#gocean)" opacity="0.8"/>
  <!-- Sun reflection on water -->
  <g opacity="0.3">
    <ellipse cx="400" cy="310" rx="60" ry="4" fill="#ffdd70"/>
    <ellipse cx="400" cy="325" rx="40" ry="3" fill="#ffdd70"/>
    <ellipse cx="400" cy="340" rx="25" ry="2" fill="#ffcc55"/>
    <ellipse cx="400" cy="355" rx="15" ry="1.5" fill="#ffcc55"/>
  </g>
  <!-- Water shimmer -->
  <g opacity="0.1">
    <path d="M50 310 Q150 306 250 310 Q350 305 450 310" stroke="#fff" stroke-width="1.5" fill="none"/>
    <path d="M300 330 Q400 326 500 330 Q600 325 700 330" stroke="#fff" stroke-width="1" fill="none"/>
    <path d="M100 350 Q200 346 300 350 Q400 345 500 350" stroke="#fff" stroke-width="1" fill="none"/>
  </g>
  <!-- Gentle waves near shore -->
  <g opacity="0.15" stroke="#fff" fill="none" stroke-width="1.5">
    <path d="M0 370 Q50 366 100 370 Q150 366 200 370 Q250 366 300 370 Q350 366 400 370 Q450 366 500 370 Q550 366 600 370 Q650 366 700 370 Q750 366 800 370"/>
    <path d="M0 380 Q60 377 120 380 Q180 377 240 380 Q300 377 360 380 Q420 377 480 380 Q540 377 600 380 Q660 377 720 380 Q760 377 800 380"/>
  </g>
  <!-- Beach shoreline -->
  <path d="M0 385 Q200 378 400 382 Q600 376 800 380 L800 450 L0 450Z" fill="#e8c890"/>
  <!-- Wet sand reflection -->
  <path d="M0 385 Q200 378 400 382 Q600 376 800 380 L800 400 Q600 394 400 398 Q200 393 0 397Z" fill="#d4b478" opacity="0.5"/>
  <!-- Beach shack silhouette -->
  <g transform="translate(160, 370)" fill="#7a5a3a" opacity="0.45">
