    <path d="M-22 -18 L0 -32 L22 -18 Z"/>
    <line x1="-20" y1="0" x2="-20" y2="-18" stroke="#7a5a3a" stroke-width="2"/>
    <line x1="20" y1="0" x2="20" y2="-18" stroke="#7a5a3a" stroke-width="2"/>
    <rect x="-4" y="-12" width="8" height="12" fill="#9a7a5a" opacity="0.5"/>
  </g>
  <!-- Right palm tree -->
  <g opacity="0.6">
    <path d="M680 385 Q675 340 670 280 Q668 260 672 240" stroke="#3a2a1a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M672 240 Q640 225 620 238" stroke="#2a4a28" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M672 240 Q690 220 710 228" stroke="#2a4a28" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M672 244 Q648 235 635 250" stroke="#2a4a28" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M672 244 Q695 232 712 242" stroke="#2a4a28" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M672 248 Q655 242 645 255" stroke="#356a35" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M672 248 Q688 240 700 250" stroke="#356a35" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Left palm tree (leaning) -->
  <g opacity="0.5">
    <path d="M100 390 Q90 350 80 310 Q72 280 85 250" stroke="#3a2a1a" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M85 250 Q55 238 40 252" stroke="#2a4a28" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M85 250 Q105 232 120 242" stroke="#2a4a28" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M85 254 Q62 245 50 260" stroke="#2a4a28" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M85 254 Q102 244 118 255" stroke="#2a4a28" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M85 257 Q70 252 60 264" stroke="#356a35" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M85 257 Q98 250 110 260" stroke="#356a35" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Far left palm -->
  <g opacity="0.3">
    <path d="M30 388 Q28 360 32 330 Q35 310 30 290" stroke="#3a2a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M30 290 Q12 280 5 292" stroke="#2a4a28" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M30 290 Q48 278 58 288" stroke="#2a4a28" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M30 294 Q18 287 10 300" stroke="#2a4a28" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M30 294 Q44 285 54 296" stroke="#2a4a28" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Foreground sand texture -->
  <path d="M0 420 Q200 414 400 418 Q600 412 800 416 L800 450 L0 450Z" fill="#d4b070" opacity="0.4"/>
</svg>