<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="tsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5a6a"/>
      <stop offset="25%" stop-color="#2a8a8a"/>
      <stop offset="50%" stop-color="#d07a40"/>
      <stop offset="75%" stop-color="#e8984a"/>
      <stop offset="100%" stop-color="#f0b860"/>
    </linearGradient>
    <radialGradient id="tsun" cx="0.65" cy="0.55" r="0.25">
      <stop offset="0%" stop-color="#fff8d0" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#f0c060" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e8984a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c08850"/>
      <stop offset="30%" stop-color="#3a8a9a"/>
      <stop offset="100%" stop-color="#2a6a7a"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="450" fill="url(#tsky)"/>
  <!-- Sunrise glow -->
  <rect width="800" height="450" fill="url(#tsun)"/>
  <!-- Sun disc -->
  <circle cx="520" cy="248" r="30" fill="#ffe080" opacity="0.85"/>
  <circle cx="520" cy="248" r="22" fill="#fff5c8" opacity="0.5"/>
  <!-- Clouds -->
  <g opacity="0.12">
    <ellipse cx="200" cy="90" rx="70" ry="14" fill="#ffd0a0"/>
    <ellipse cx="650" cy="110" rx="55" ry="12" fill="#ffd0a0"/>
    <ellipse cx="400" cy="70" rx="60" ry="10" fill="#ffd0a0"/>
  </g>
  <!-- Temple gopuram silhouette (ornate, tall tiered pyramid) -->
  <g transform="translate(280, 170)" fill="#4a3a2a" opacity="0.6">
    <!-- Base structure -->
    <rect x="-30" y="60" width="60" height="40" rx="1"/>
    <!-- Tier 1 -->
    <path d="M-28 60 L-24 40 L24 40 L28 60Z"/>
    <!-- Tier 2 -->
    <path d="M-22 40 L-18 22 L18 22 L22 40Z"/>
    <!-- Tier 3 -->
    <path d="M-16 22 L-12 6 L12 6 L16 22Z"/>
    <!-- Tier 4 -->
    <path d="M-10 6 L-7 -8 L7 -8 L10 6Z"/>
    <!-- Tier 5 -->
    <path d="M-5 -8 L-3 -18 L3 -18 L5 -8Z"/>
    <!-- Crown -->
    <path d="M-4 -18 L0 -28 L4 -18Z"/>
    <ellipse cx="0" cy="-28" rx="2.5" ry="3"/>
    <!-- Ornamental detail lines -->
    <g stroke="#5a4a35" stroke-width="0.5" opacity="0.4">
      <line x1="-26" y1="50" x2="26" y2="50"/>
      <line x1="-22" y1="30" x2="22" y2="30"/>
      <line x1="-16" y1="14" x2="16" y2="14"/>
      <line x1="-10" y1="0" x2="10" y2="0"/>
    </g>
    <!-- Entrance arch -->
    <ellipse cx="0" cy="100" rx="10" ry="15" fill="#3a2a1a"/>
    <!-- Small figures on tiers -->
    <g fill="#5a4a35" opacity="0.5">
      <ellipse cx="-20" cy="42" rx="2" ry="3"/>
      <ellipse cx="20" cy="42" rx="2" ry="3"/>
      <ellipse cx="-14" cy="24" rx="1.5" ry="2.5"/>
      <ellipse cx="14" cy="24" rx="1.5" ry="2.5"/>
      <ellipse cx="-8" cy="8" rx="1.5" ry="2"/>
      <ellipse cx="8" cy="8" rx="1.5" ry="2"/>
    </g>
  </g>
  <!-- Secondary smaller temple -->
  <g transform="translate(180, 230)" fill="#5a4a35" opacity="0.35">
    <rect x="-12" y="0" width="24" height="20" rx="1"/>
    <path d="M-10 0 L0 -15 L10 0Z"/>
    <ellipse cx="0" cy="-15" rx="2" ry="2.5"/>
  </g>
  <!-- Ocean -->
  <path d="M0 290 Q200 282 400 286 Q600 278 800 284 L800 450 L0 450Z" fill="url(#tocean)" opacity="0.8"/>
  <!-- Sun reflection on water -->
  <g opacity="0.3">
    <ellipse cx="520" cy="305" rx="50" ry="4" fill="#ffd060"/>
    <ellipse cx="520" cy="320" rx="35" ry="3" fill="#ffd060"/>
    <ellipse cx="520" cy="335" rx="22" ry="2" fill="#ffcc55"/>
  </g>
  <!-- Fishing catamaran silhouette -->
  <g transform="translate(600, 275)" fill="#4a3a2a" opacity="0.4">
    <!-- Two hull logs -->
    <path d="M-18 6 Q-22 8 -18 10 L22 10 Q25 8 22 6Z"/>
    <path d="M-18 12 Q-22 14 -18 16 L22 16 Q25 14 22 12Z"/>
    <!-- Cross beams -->
    <rect x="-8" y="6" width="2" height="10"/>
    <rect x="8" y="6" width="2" height="10"/>
    <!-- Mast -->
    <line x1="2" y1="6" x2="2" y2="-14" stroke="#4a3a2a" stroke-width="1.5"/>
    <!-- Sail -->
    <path d="M2 -14 Q12 -6 2 2" fill="#6a5a45" opacity="0.5"/>
    <!-- Figure -->
    <ellipse cx="-4" cy="3" rx="2" ry="3" fill="#4a3a2a"/>
  </g>
  <!-- Waves -->
  <g opacity="0.15" stroke="#fff" fill="none" stroke-width="1.5">
    <path d="M0 360 Q40 356 80 360 Q120 356 160 360 Q200 356 240 360 Q280 356 320 360 Q360 356 400 360 Q440 356 480 360 Q520 356 560 360 Q600 356 640 360 Q680 356 720 360 Q760 356 800 360"/>
    <path d="M0 375 Q50 372 100 375 Q150 372 200 375 Q250 372 300 375 Q350 372 400 375 Q450 372 500 375 Q550 372 600 375 Q650 372 700 375 Q750 372 800 375"/>
  </g>
  <!-- Water shimmer -->
  <g opacity="0.1">
    <path d="M100 310 Q200 306 300 310 Q400 305 500 310" stroke="#fff" stroke-width="1.5" fill="none"/>
    <path d="M200 340 Q300 336 400 340 Q500 335 600 340" stroke="#fff" stroke-width="1" fill="none"/>
  </g>
  <!-- Beach/shore -->
  <path d="M0 385 Q200 378 400 382 Q600 376 800 380 L800 450 L0 450Z" fill="#d8b878"/>
  <!-- Wet sand -->
  <path d="M0 385 Q200 378 400 382 Q600 376 800 380 L800 395 Q600 388 400 392 Q200 387 0 392Z" fill="#c4a868" opacity="0.5"/>
  <!-- Left coconut palms framing -->
  <g opacity="0.55">
    <path d="M50 390 Q42 350 35 300 Q30 270 40 240" stroke="#3a2a18" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M40 240 Q15 228 5 242" stroke="#2a5a28" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M40 240 Q60 222 75 235" stroke="#2a5a28" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M40 244 Q22 235 12 250" stroke="#2a5a28" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M40 244 Q58 232 72 245" stroke="#2a5a28" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M40 248 Q28 242 18 255" stroke="#358538" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M40 248 Q55 240 65 252" stroke="#358538" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Coconuts -->
    <circle cx="38" cy="244" r="2.5" fill="#5a4020" opacity="0.6"/>
    <circle cx="42" cy="246" r="2.5" fill="#5a4020" opacity="0.6"/>
  </g>
  <!-- Right coconut palm -->
  <g opacity="0.45">
    <path d="M740 388 Q745 350 748 305 Q750 275 745 248" stroke="#3a2a18" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M745 248 Q722 235 712 248" stroke="#2a5a28" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M745 248 Q765 232 778 245" stroke="#2a5a28" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M745 252 Q728 244 718 258" stroke="#2a5a28" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M745 252 Q762 242 774 254" stroke="#2a5a28" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M745 256 Q734 250 726 262" stroke="#358538" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M745 256 Q758 248 768 260" stroke="#358538" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Foreground sand -->
  <path d="M0 425 Q200 418 400 422 Q600 416 800 420 L800 450 L0 450Z" fill="#c8a860" opacity="0.35"/>
  <!-- Birds -->
  <g stroke="#2a5a5a" stroke-width="1.3" fill="none" opacity="0.25">
    <path d="M400 100 Q405 93 410 100 Q415 93 420 100"/>
    <path d="M440 85 Q444 79 448 85 Q452 79 456 85"/>
    <path d="M370 115 Q374 109 378 115 Q382 109 386 115"/>
    <path d="M460 105 Q464 100 468 105 Q472 100 476 105"/>
  </g>
</svg>