  <path d="M240 110 L270 145 L255 145 L280 180 Z" fill="white" opacity="0.4"/>
  <path d="M400 90 L430 130 L415 130 L440 165 Z" fill="white" opacity="0.4"/>
  <path d="M560 100 L590 140 L575 140 L600 165 Z" fill="white" opacity="0.4"/>
