  <g fill="#2d5540" opacity="0.7">
    <polygon points="100,310 108,280 110,290 118,260 120,275 128,250 120,270 122,260 114,285 116,278 108,300"/>
    <polygon points="250,305 258,275 260,285 268,255 270,270 278,245 270,265 272,255 264,280 266,273 258,295"/>
    <polygon points="450,300 458,270 460,280 468,250 470,265 478,240 470,260 472,250 464,275 466,268 458,290"/>
    <polygon points="650,308 658,278 660,288 668,258 670,273 678,248 670,268 672,258 664,283 666,276 658,298"/>
    <polygon points="350,315 356,290 358,298 364,272 366,284 370,262 366,280 368,272 360,294 362,288 356,308"/>
    <polygon points="550,312 556,287 558,295 564,269 566,281 570,259 566,277 568,269 560,291 562,285 556,305"/>
  </g>
  <!-- Valley/river -->
  <path d="M0 380 Q100 368 200 374 Q350 360 500 370 Q650 358 800 368 L800 450 L0 450Z" fill="#4a7a5a"/>
  <!-- River -->
  <path d="M200 395 Q300 388 400 392 Q500 385 600 390 Q700 384 750 388" stroke="#7ab8c0" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M180 405 Q280 398 380 402 Q480 395 580 400 Q680 394 770 398" stroke="#7ab8c0" stroke-width="2" fill="none" opacity="0.25" stroke-linecap="round"/>
  <!-- Foreground -->
  <path d="M0 420 Q150 408 350 415 Q550 405 800 415 L800 450 L0 450Z" fill="#3a6248" opacity="0.6"/>
