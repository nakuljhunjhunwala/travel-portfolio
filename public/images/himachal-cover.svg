  <g stroke="#345" stroke-width="1.2" fill="none" opacity="0.25">
    <path d="M480 120 Q485 114 490 120 Q495 114 500 120"/>
    <path d="M520 108 Q524 103 528 108 Q532 103 536 108"/>
    <path d="M460 135 Q464 130 468 135 Q472 130 476 135"/>
