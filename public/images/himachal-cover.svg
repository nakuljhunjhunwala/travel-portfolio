<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="hsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a7a9b"/>
      <stop offset="45%" stop-color="#7aafc0"/>
      <stop offset="100%" stop-color="#b8d8d8"/>
    </linearGradient>
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4f5"/>
      <stop offset="100%" stop-color="#d8e4e8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#hsky)"/>
  <!-- Clouds -->
  <g opacity="0.15" fill="white">
    <ellipse cx="150" cy="80" rx="70" ry="22"/>
    <ellipse cx="190" cy="75" rx="50" ry="18"/>
    <ellipse cx="600" cy="60" rx="60" ry="20"/>
    <ellipse cx="640" cy="55" rx="45" ry="16"/>
  </g>
