<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="usky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="30%" stop-color="#3a5a8a"/>
      <stop offset="55%" stop-color="#7a9ac0"/>
      <stop offset="80%" stop-color="#d4b88a"/>
      <stop offset="100%" stop-color="#e8c870"/>
    </linearGradient>
    <radialGradient id="usun" cx="0.7" cy="0.55" r="0.25">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#e8c870" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e8c870" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="usnow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f5ff"/>
      <stop offset="100%" stop-color="#c0d0e8"/>
    </linearGradient>
    <linearGradient id="umist1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0b8d0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a0b8d0" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="450" fill="url(#usky)"/>
  <!-- Dawn glow -->
  <rect width="800" height="450" fill="url(#usun)"/>
  <!-- Stars fading -->
  <g fill="#fff" opacity="0.15">
    <circle cx="80" cy="40" r="1.2"/>
    <circle cx="200" cy="65" r="1"/>
    <circle cx="350" cy="30" r="1.3"/>
    <circle cx="500" cy="50" r="0.8"/>
    <circle cx="650" cy="35" r="1.1"/>
    <circle cx="120" cy="80" r="0.9"/>
    <circle cx="720" cy="70" r="1"/>
  </g>
  <!-- Far Himalayan peaks (snow-capped, sharp) -->
  <g>
    <path d="M0 250 L60 180 L100 210 L160 130 L210 190 L280 100 L340 170 L400 120 L460 175 L520 90 L580 160 L640 110 L700 170 L750 140 L800 180 L800 260 L0 260Z" fill="#8a9ab8" opacity="0.5"/>
    <!-- Snow caps -->
    <path d="M160 130 L145 155 L175 155Z" fill="url(#usnow)" opacity="0.8"/>
    <path d="M280 100 L260 130 L300 130Z" fill="url(#usnow)" opacity="0.9"/>
    <path d="M400 120 L382 148 L418 148Z" fill="url(#usnow)" opacity="0.85"/>
    <path d="M520 90 L498 125 L542 125Z" fill="url(#usnow)" opacity="0.95"/>
    <path d="M640 110 L622 140 L658 140Z" fill="url(#usnow)" opacity="0.85"/>
    <path d="M750 140 L735 162 L765 162Z" fill="url(#usnow)" opacity="0.8"/>
  </g>
  <!-- Mist layer 1 -->
  <ellipse cx="400" cy="220" rx="450" ry="25" fill="#a0b8d0" opacity="0.25"/>
  <!-- Mid-range mountains -->
  <path d="M0 290 Q80 255 150 270 Q220 240 310 260 Q380 235 460 255 Q540 240 620 260 Q700 245 800 265 L800 310 L0 310Z" fill="#5a7a60" opacity="0.6"/>
  <!-- Temple silhouette on ridge -->
  <g transform="translate(460, 248)" fill="#4a5a50" opacity="0.55">
    <rect x="-8" y="-20" width="16" height="20" rx="1"/>
    <path d="M-10 -20 L0 -32 L10 -20Z"/>
    <circle cx="0" cy="-32" r="2.5"/>
    <line x1="0" y1="-34.5" x2="0" y2="-40" stroke="#4a5a50" stroke-width="1.5"/>
    <rect x="-12" y="0" width="24" height="3" rx="1"/>
  </g>
  <!-- Mist layer 2 -->
  <ellipse cx="350" cy="290" rx="420" ry="18" fill="#8aaa98" opacity="0.3"/>
  <!-- Dense deodar forest layer -->
  <g fill="#2a5a38" opacity="0.7">
    <!-- Row of deodar trees -->
    <path d="M0 340 L0 310 Q20 295 40 310 Q50 298 60 310 Q75 292 90 310 Q100 296 110 310 Q125 290 140 310 Q150 296 160 310 Q175 288 190 310 Q200 295 210 310 Q225 285 240 310 Q250 293 260 310 Q275 287 290 310 Q300 292 310 310 Q325 284 340 310 Q350 290 360 310 Q375 282 390 310 Q400 288 410 310 Q425 280 440 310 Q450 286 460 310 Q475 278 490 310 Q500 285 510 310 Q525 276 540 310 Q550 283 560 310 Q575 275 590 310 Q600 280 610 310 Q625 272 640 310 Q650 278 660 310 Q675 270 690 310 Q700 276 710 310 Q725 268 740 310 Q750 274 760 310 Q775 266 790 310 L800 310 L800 340 Z"/>
  </g>
  <!-- Forest mid layer -->
  <path d="M0 350 Q50 335 100 342 Q150 330 200 340 Q250 328 300 338 Q350 325 400 336 Q450 322 500 334 Q550 320 600 332 Q650 318 700 330 Q750 316 800 328 L800 360 L0 360Z" fill="#1a4a2a" opacity="0.6"/>
  <!-- River (Ganga-like) flowing through valley -->
  <g>
    <path d="M350 340 Q320 355 340 370 Q365 385 340 400 Q310 415 330 430 Q345 445 340 450 L370 450 Q365 445 360 430 Q380 415 370 400 Q350 385 375 370 Q400 355 380 340Z" fill="#6aa0c0" opacity="0.5"/>
    <!-- Water shimmer -->
    <path d="M355 360 Q360 358 365 360" stroke="#fff" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M345 390 Q350 388 355 390" stroke="#fff" stroke-width="1" fill="none" opacity="0.25"/>
    <path d="M350 420 Q355 418 360 420" stroke="#fff" stroke-width="1" fill="none" opacity="0.2"/>
  </g>
  <!-- Foreground forest (darker) -->
  <g fill="#0e3a1a" opacity="0.5">
    <path d="M0 400 Q15 380 30 400 Q40 385 50 400 Q60 382 70 400 Q80 378 90 400 Q100 375 110 400 L110 450 L0 450Z"/>
    <path d="M700 395 Q715 375 730 395 Q740 372 750 395 Q760 368 770 395 Q780 365 790 395 L800 395 L800 450 L700 450Z"/>
  </g>
  <!-- Valley floor -->
  <path d="M0 410 Q200 400 400 405 Q600 398 800 402 L800 450 L0 450Z" fill="#1a3a22" opacity="0.4"/>
  <!-- Foreground grass -->
  <path d="M0 435 Q200 428 400 432 Q600 426 800 430 L800 450 L0 450Z" fill="#142e18" opacity="0.35"/>
  <!-- Birds -->
  <g stroke="#4a6a80" stroke-width="1.2" fill="none" opacity="0.25">
    <path d="M560 150 Q565 143 570 150 Q575 143 580 150"/>
    <path d="M600 135 Q604 129 608 135 Q612 129 616 135"/>
    <path d="M540 165 Q544 159 548 165 Q552 159 556 165"/>
    <path d="M620 155 Q624 150 628 155 Q632 150 636 155"/>
  </g>
</svg>