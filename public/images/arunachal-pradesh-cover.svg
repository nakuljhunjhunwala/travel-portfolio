<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="apsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a8ec8"/>
      <stop offset="40%" stop-color="#7ab8e0"/>
      <stop offset="70%" stop-color="#c0dce8"/>
      <stop offset="100%" stop-color="#e8f0f4"/>
    </linearGradient>
    <linearGradient id="apmtn1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#d8e4f0"/>
      <stop offset="100%" stop-color="#8a9cb0"/>
    </linearGradient>
    <linearGradient id="apmtn2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8eef4"/>
      <stop offset="100%" stop-color="#7888a0"/>
    </linearGradient>
    <linearGradient id="apforest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a5040"/>
      <stop offset="100%" stop-color="#1a3528"/>
    </linearGradient>
    <linearGradient id="apmist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0e0e8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#d0e0e8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="450" fill="url(#apsky)"/>

  <!-- Dramatic far peaks (Eastern Himalayas) -->
  <path d="M0 160 L40 130 L80 150 L130 80 L170 110 L210 60 L260 95 L300 50 L340 80 L380 45 L420 75 L460 35 L500 70 L540 40 L580 65 L620 30 L660 58 L700 25 L740 55 L780 40 L800 60 L800 200 L0 200Z" fill="url(#apmtn1)" opacity="0.8"/>

  <!-- Snow caps highlight -->
  <g fill="#ffffff" opacity="0.6">
    <path d="M210 60 L225 52 L240 65 L230 75Z"/>
    <path d="M300 50 L315 42 L330 55 L320 65Z"/>
    <path d="M460 35 L475 28 L490 42 L478 52Z"/>
    <path d="M620 30 L635 22 L650 38 L638 48Z"/>
    <path d="M700 25 L712 18 L728 32 L718 42Z"/>
  </g>

  <!-- Mid mountains -->
  <path d="M0 220 L60 185 L120 205 L180 170 L240 195 L300 160 L360 185 L420 155 L480 180 L540 150 L600 175 L660 148 L720 172 L780 155 L800 165 L800 260 L0 260Z" fill="url(#apmtn2)" opacity="0.7"/>

  <!-- Mist in valley -->
  <rect x="0" y="240" width="800" height="40" fill="url(#apmist)"/>

  <!-- Monastery hill -->
  <path d="M280 260 Q340 200 430 195 Q520 200 560 260Z" fill="#6a7a68" opacity="0.7"/>

  <!-- Tawang-like monastery -->
  <g transform="translate(370, 210)" fill="#8a7060" opacity="0.75">
    <!-- Main building base -->
    <rect x="-40" y="0" width="80" height="35" rx="2"/>
    <!-- Upper level -->
    <rect x="-30" y="-15" width="60" height="18" rx="2"/>
    <!-- Top structure -->
    <rect x="-18" y="-28" width="36" height="15" rx="2"/>
    <!-- Roof peak -->
    <path d="M-20 -28 L0 -40 L20 -28Z" fill="#a08060"/>
    <!-- Windows -->
    <g fill="#c8b890" opacity="0.6">
      <rect x="-32" y="8" width="6" height="8" rx="1"/>
      <rect x="-20" y="8" width="6" height="8" rx="1"/>
      <rect x="-8" y="8" width="6" height="8" rx="1"/>
      <rect x="4" y="8" width="6" height="8" rx="1"/>
      <rect x="16" y="8" width="6" height="8" rx="1"/>
      <rect x="28" y="8" width="6" height="8" rx="1"/>
      <rect x="-22" y="-10" width="5" height="6" rx="1"/>
      <rect x="-10" y="-10" width="5" height="6" rx="1"/>
      <rect x="2" y="-10" width="5" height="6" rx="1"/>
      <rect x="14" y="-10" width="5" height="6" rx="1"/>
    </g>
    <!-- Steps -->
    <rect x="-15" y="35" width="30" height="4" fill="#7a6550"/>
    <rect x="-10" y="39" width="20" height="4" fill="#7a6550"/>
  </g>

  <!-- Prayer flags (strings between poles) -->
  <g opacity="0.55">
    <line x1="310" y1="200" x2="440" y2="195" stroke="#888" stroke-width="0.5"/>
    <!-- Flag triangles -->
    <polygon points="318,200 325,200 322,206" fill="#e04040" opacity="0.6"/>
    <polygon points="332,199 339,199 336,205" fill="#e0e040" opacity="0.6"/>
    <polygon points="346,198 353,198 350,204" fill="#40a040" opacity="0.6"/>
    <polygon points="360,197 367,197 364,203" fill="#4040e0" opacity="0.6"/>
    <polygon points="374,197 381,197 378,203" fill="#ffffff" opacity="0.5"/>
    <polygon points="388,196 395,196 392,202" fill="#e04040" opacity="0.6"/>
    <polygon points="402,195 409,195 406,201" fill="#e0e040" opacity="0.6"/>
    <polygon points="416,195 423,195 420,201" fill="#40a040" opacity="0.6"/>
    <polygon points="430,195 437,195 434,201" fill="#4040e0" opacity="0.6"/>
  </g>

  <!-- Dense conifer forest layer 1 (far) -->
  <g fill="#2a5a42" opacity="0.5">
    <path d="M0 280 Q20 260 40 280 Q60 260 80 280 Q100 258 120 280 Q140 256 160 280 Q180 254 200 280 Q220 256 240 280 Q260 258 280 280 L280 300 L0 300Z"/>
    <path d="M500 278 Q520 258 540 278 Q560 256 580 278 Q600 254 620 278 Q640 256 660 278 Q680 258 700 278 Q720 256 740 278 Q760 258 780 278 Q790 260 800 278 L800 298 L500 298Z"/>
  </g>

  <!-- Dense conifer forest layer 2 (mid) -->
  <g fill="#1e4834" opacity="0.65">
    <path d="M0 310 Q15 288 30 310 Q45 285 60 310 Q75 283 90 310 Q105 280 120 310 Q135 283 150 310 Q165 285 180 310 Q195 288 210 310 Q225 285 240 310 Q255 283 270 310 Q285 286 300 310 Q315 283 330 310 Q345 285 360 310 L360 340 L0 340Z"/>
    <path d="M440 308 Q455 286 470 308 Q485 283 500 308 Q515 280 530 308 Q545 283 560 308 Q575 285 590 308 Q605 283 620 308 Q635 286 650 308 Q665 283 680 308 Q695 285 710 308 Q725 283 740 308 Q755 286 770 308 Q785 283 800 308 L800 338 L440 338Z"/>
  </g>

  <!-- Dense conifer forest layer 3 (near) -->
  <path d="M0 350 Q12 325 24 350 Q36 320 48 350 Q60 318 72 350 Q84 322 96 350 Q108 318 120 350 Q132 322 144 350 Q156 318 168 350 Q180 322 192 350 Q204 320 216 350 Q228 322 240 350 Q252 318 264 350 Q276 322 288 350 Q300 318 312 350 Q324 322 336 350 Q348 318 360 350 Q372 322 384 350 Q396 320 408 350 Q420 322 432 350 Q444 318 456 350 Q468 322 480 350 Q492 318 504 350 Q516 322 528 350 Q540 320 552 350 Q564 322 576 350 Q588 318 600 350 Q612 322 624 350 Q636 318 648 350 Q660 322 672 350 Q684 320 696 350 Q708 322 720 350 Q732 318 744 350 Q756 322 768 350 Q780 320 792 350 L800 350 L800 395 L0 395Z" fill="#163a28" opacity="0.8"/>

  <!-- Foreground grassy slope -->
  <path d="M0 395 Q200 380 400 390 Q600 378 800 388 L800 450 L0 450Z" fill="#2a5838"/>

  <!-- Yak silhouette in foreground -->
  <g transform="translate(150, 390)" fill="#1a2a1a" opacity="0.6">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="28" ry="16"/>
    <!-- Head -->
    <ellipse cx="-25" cy="-8" rx="10" ry="8"/>
    <!-- Horns -->
    <path d="M-30 -15 Q-35 -24 -28 -22" fill="none" stroke="#1a2a1a" stroke-width="2.5"/>
    <path d="M-22 -15 Q-18 -24 -25 -22" fill="none" stroke="#1a2a1a" stroke-width="2.5"/>
    <!-- Legs -->
    <line x1="-15" y1="14" x2="-17" y2="28" stroke="#1a2a1a" stroke-width="4"/>
    <line x1="-5" y1="14" x2="-4" y2="28" stroke="#1a2a1a" stroke-width="4"/>
    <line x1="10" y1="14" x2="9" y2="28" stroke="#1a2a1a" stroke-width="4"/>
    <line x1="22" y1="14" x2="23" y2="28" stroke="#1a2a1a" stroke-width="4"/>
    <!-- Shaggy underside -->
    <path d="M-20 12 Q-15 18 -8 12 Q-2 18 5 12 Q10 18 18 12" fill="#1a2a1a"/>
    <!-- Tail -->
    <path d="M28 -2 Q38 -5 35 5" fill="none" stroke="#1a2a1a" stroke-width="3"/>
  </g>

  <!-- Foreground grass detail -->
  <path d="M0 420 Q100 410 200 418 Q400 405 600 415 Q700 408 800 412 L800 450 L0 450Z" fill="#1e4830" opacity="0.6"/>

  <!-- Tiny grass tufts -->
  <g stroke="#2a6040" stroke-width="1" fill="none" opacity="0.4">
    <path d="M50 415 Q52 408 55 415"/>
    <path d="M300 410 Q302 403 305 410"/>
    <path d="M500 412 Q502 405 505 412"/>
    <path d="M700 408 Q702 401 705 408"/>
  </g>
</svg>