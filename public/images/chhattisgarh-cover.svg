<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="cgsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a8848"/>
      <stop offset="30%" stop-color="#68a058"/>
      <stop offset="60%" stop-color="#88b870"/>
      <stop offset="100%" stop-color="#a8c888"/>
    </linearGradient>
    <linearGradient id="cglight" x1="0.4" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#f0e0a0" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#f0d880" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f0e0a0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cgwater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#88b890" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#608870" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="cgmist" cx="0.5" cy="0.65" r="0.3">
      <stop offset="0%" stop-color="#d0e8d0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#d0e8d0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky / canopy glow -->
