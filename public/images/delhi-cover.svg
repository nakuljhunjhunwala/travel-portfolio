    <circle cx="150" cy="315" r="1" fill="#ffe080"/>
    <circle cx="220" cy="308" r="1.5" fill="#ffc850"/>
    <circle cx="300" cy="312" r="1.2" fill="#ffd060"/>
    <circle cx="350" cy="305" r="1.5" fill="#ffe080"/>
    <circle cx="450" cy="310" r="1.3" fill="#ffc850"/>
    <circle cx="520" cy="308" r="1.5" fill="#ffd060"/>
    <circle cx="560" cy="315" r="1" fill="#ffe080"/>
    <circle cx="620" cy="305" r="1.4" fill="#ffd060"/>
    <circle cx="700" cy="310" r="1.2" fill="#ffc850"/>
    <circle cx="750" cy="308" r="1.5" fill="#ffe080"/>
    <circle cx="280" cy="318" r="1" fill="#ffd870"/>
    <circle cx="480" cy="320" r="1.3" fill="#ffd060"/>
