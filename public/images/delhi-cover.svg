<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="dlsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2868"/>
      <stop offset="30%" stop-color="#5a3878"/>
      <stop offset="55%" stop-color="#8a4870"/>
      <stop offset="75%" stop-color="#c86878"/>
      <stop offset="100%" stop-color="#d8908a"/>
    </linearGradient>
    <radialGradient id="dlglow" cx="0.5" cy="0.75" r="0.35">
      <stop offset="0%" stop-color="#e8a898" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#c86878" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c86878" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Dusky pink-to-indigo sky -->
  <rect width="800" height="450" fill="url(#dlsky)"/>
  <rect width="800" height="450" fill="url(#dlglow)"/>
  <!-- Stars hint -->
  <g fill="#fff" opacity="0.15">
