    <circle cx="250" cy="25" r="0.8"/>
    <circle cx="380" cy="50" r="1"/>
    <circle cx="520" cy="35" r="0.8"/>
    <circle cx="680" cy="45" r="1"/>
    <circle cx="150" cy="70" r="0.7"/>
    <circle cx="450" cy="30" r="0.9"/>
    <circle cx="600" cy="60" r="0.8"/>
