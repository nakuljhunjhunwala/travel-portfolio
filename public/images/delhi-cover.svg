    <rect x="600" y="254" width="8" height="10"/>
    <rect x="615" y="254" width="8" height="10"/>
    <rect x="630" y="254" width="8" height="10"/>
    <rect x="645" y="254" width="8" height="10"/>
    <rect x="660" y="254" width="8" height="10"/>
    <rect x="675" y="254" width="8" height="10"/>
    <rect x="690" y="254" width="8" height="10"/>
    <rect x="705" y="254" width="8" height="10"/>
    <rect x="720" y="254" width="8" height="10"/>
    <rect x="735" y="254" width="8" height="10"/>
    <rect x="750" y="254" width="8" height="10"/>
    <rect x="765" y="254" width="8" height="10"/>
    <rect x="780" y="254" width="8" height="10"/>
