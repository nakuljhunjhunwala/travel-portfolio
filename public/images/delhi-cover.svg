  <path d="M0 420 Q200 416 400 418 Q600 414 800 416 L800 450 L0 450Z" fill="#150620" opacity="0.3"/>
  <!-- Birds -->
  <g stroke="#6a4868" stroke-width="1.3" fill="none" opacity="0.3">
    <path d="M350 140 Q355 134 360 140 Q365 134 370 140"/>
    <path d="M390 128 Q394 123 398 128 Q402 123 406 128"/>
    <path d="M420 142 Q424 137 428 142 Q432 137 436 142"/>
    <path d="M330 155 Q334 150 338 155 Q342 150 346 155"/>
    <path d="M450 135 Q453 131 456 135 Q459 131 462 135"/>
  </g>
</svg>